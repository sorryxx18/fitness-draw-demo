<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>臺北市政府消防局 - 體能抽測抽籤系統</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --tfd-red: #D32F2F;
      --tfd-blue: #1976D2;
      --tfd-gold: #FFD600;
      --text-main: #263238;
      --font-primary: 'Noto Sans TC', sans-serif;
      --font-num: 'Montserrat', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* 1. 流動感漸層背景 */
    body {
      font-family: var(--font-primary);
      color: var(--text-main);
      min-height: 100vh;
      background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 25%, #fdfbfb 50%, #eef1f5 75%, #fdfbfb 100%);
      background-size: 400% 400%;
      animation: flowingGradient 15s ease infinite;
      overflow-x: hidden;
    }
    @keyframes flowingGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 頂部 Header - 明亮 TFD 風格 */
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 12px 40px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      border-top: 6px solid var(--tfd-red);
      position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .logo-zone { display: flex; align-items: center; gap: 15px; }
    .logo-img { width: 50px; height: 50px; object-fit: contain; }
    .header-title h1 { font-size: 24px; font-weight: 900; letter-spacing: 1px; color: #1a1a1a; }
    .header-title p { font-size: 11px; color: var(--tfd-blue); font-family: var(--font-num); font-weight: 700; letter-spacing: 2px; }

    /* 頂部稽核資訊 */
    .audit-bar {
      display: flex; gap: 20px; font-family: var(--font-num); font-size: 12px;
      background: #f8f9fa; padding: 10px 20px; border-radius: 50px; border: 1px solid #dee2e6;
    }
    .audit-label { color: var(--tfd-blue); font-weight: 700; }
    .audit-value { color: var(--tfd-red); font-weight: 900; }

    .main-content { max-width: 1300px; margin: 30px auto; padding: 0 25px; }

    /* 控制面板 - 毛玻璃與反光 */
    .control-grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; margin-bottom: 40px; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(15px);
      border-radius: 20px; padding: 25px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 10px 35px rgba(0,0,0,0.05);
    }
    .panel-title { 
      font-size: 17px; font-weight: 900; color: #1a237e; margin-bottom: 20px; 
      border-left: 5px solid var(--tfd-red); padding-left: 12px;
    }

    /* 按鈕樣式 */
    .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; font-size: 14px; }
    .btn-primary { background: linear-gradient(135deg, var(--tfd-red), #b71c1c); color: white; width: 100%; font-size: 18px; padding: 16px; margin-top: 15px; box-shadow: 0 5px 15px rgba(211,47,47,0.3); }
    .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(211,47,47,0.4); }
    .btn-primary:disabled { background: #9e9e9e; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: #fff; border: 1px solid #cfd8dc; color: #455a64; }
    .btn-outline:hover { border-color: var(--tfd-blue); color: var(--tfd-blue); background: #f1f8ff; }

    input[type="number"], input[type="text"] {
      padding: 12px; border: 1px solid #cfd8dc; border-radius: 10px; outline: none; transition: 0.3s; font-family: var(--font-num);
    }
    input[type="number"]:focus, input[type="text"]:focus { border-color: var(--tfd-blue); box-shadow: 0 0 0 4px rgba(25,118,210,0.1); }

    /* 單位清單 */
    .list-container { background: rgba(255,255,255,0.4); border-radius: 12px; padding: 15px; border: 1px solid rgba(0,0,0,0.05); }
    .quota-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 15px; background: white; border-radius: 10px; margin-bottom: 10px;
      border: 1px solid #eceff1; transition: 0.2s;
    }
    .quota-item:hover { transform: scale(1.02); border-color: var(--tfd-blue); }

    /* 大螢幕 */
    .mega-screen {
      width: 100%; max-width: 900px; margin: 0 auto 50px auto; aspect-ratio: 21/9;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
      border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .mega-screen::after {
      content: ""; position: absolute; inset: 0; 
      background: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px; pointer-events: none;
    }
    .mega-unit { font-size: 22px; color: #a2d2ff; letter-spacing: 5px; font-weight: 700; margin-bottom: 15px; }
    .mega-name { font-size: 90px; font-weight: 900; color: white; letter-spacing: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.3); z-index: 10; }
    .mega-name.winner { color: var(--tfd-gold); text-shadow: 0 0 30px rgba(255,214,0,0.5); }
    .draw-counter { position: absolute; top: 20px; right: 30px; color: rgba(255,255,255,0.4); font-family: var(--font-num); font-weight: 900; font-size: 20px; }

    /* 卡片彈出動畫 (亮牌) */
    .winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; padding-bottom: 100px; }
    .card {
      background: white; border-radius: 16px; padding: 20px; text-align: center;
      border-top: 6px solid var(--tfd-red); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      animation: popReveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0; transform: scale(0.6) translateY(40px);
    }
    @keyframes popReveal {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .c-tag { font-family: var(--font-num); font-weight: 900; font-size: 14px; color: var(--tfd-red); margin-bottom: 10px; display: block; }
    .c-name { font-size: 28px; font-weight: 900; color: #263238; margin-bottom: 5px; }
    .c-unit { font-size: 14px; color: #607d8b; font-weight: 700; }
    .c-id { font-family: var(--font-num); font-size: 13px; color: #b0bec5; margin-top: 12px; border-top: 1px solid #f1f3f4; padding-top: 10px; }

    #confettiCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo-zone">
      <img src="./assets/logo.jpg" alt="TFD" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 50 50\'><circle cx=\'25\' cy=\'25\' r=\'24\' fill=\'%23D32F2F\'/><text x=\'50%\' y=\'50%\' fill=\'white\' font-size=\'14\' font-family=\'sans-serif\' font-weight=\'bold\' text-anchor=\'middle\' dy=\'.3em\'>TFD</text></svg>'">
      <div class="header-title">
        <h1>臺北市政府消防局 體能抽測抽籤系統</h1>
        <p>OFFICIAL DIGITAL SELECTION SYSTEM</p>
      </div>
    </div>
    <div class="audit-bar">
      <div><span class="audit-label">HASH:</span> <span id="dashHash" class="audit-value">---</span></div>
      <div><span class="audit-label">SEED:</span> <span id="dashSeed" class="audit-value">---</span></div>
    </div>
  </header>

  <main class="main-content">
    <div class="control-grid">
      <!-- 1. 資料區 -->
      <div class="glass-panel">
        <div class="panel-title">名冊清單管理</div>
        <label class="btn btn-outline" style="display: block; text-align: center; cursor: pointer; margin-bottom: 15px;">
          📥 上傳自定義 CSV 名冊
          <input type="file" id="csvFileInput" accept=".csv" style="display:none;">
        </label>
        <button class="btn btn-outline" style="width: 100%; margin-bottom: 15px;" onclick="loadDemoData()">✨ 載入預設測試名單</button>
        <button class="btn btn-outline" style="width: 100%;" onclick="downloadSample()">📄 下載 CSV 範例檔</button>
        
        <div style="margin-top: 25px;">
          <label style="font-size: 13px; font-weight: 900; color: var(--tfd-blue); margin-bottom: 8px; display: block;">🔑 稽核驗證碼 (Seed)</label>
          <input type="text" id="seedInput" placeholder="輸入特定代碼以重現結果..." style="width: 100%;">
        </div>
      </div>

      <!-- 2. 設定區 -->
      <div class="glass-panel">
        <div class="panel-title">抽籤單位與名額設定</div>
        <div style="display: flex; gap: 20px; align-items: center; background: #f1f3f4; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
          <label style="font-weight: 700; cursor: pointer;"><input type="checkbox" id="checkAllBtn" checked onchange="toggleAllUnits(this.checked)"> 全選單位</label>
          <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 13px; font-weight: 700;">統一人數：</span>
            <input type="number" id="globalQuotaInput" value="20" style="width: 80px;">
            <button class="btn btn-outline" style="padding: 8px 15px;" onclick="applyGlobalQuota()">批次套用</button>
          </div>
          <label style="color: var(--tfd-red); font-weight: 700; cursor: pointer; padding-left: 15px; border-left: 1px solid #ccc;">
            <input type="checkbox" id="turboMode"> 極速模式
          </label>
        </div>

        <div class="list-container" id="quotaList">
          <div style="text-align: center; color: #90a4ae; padding: 20px;">等待資料載入中...</div>
        </div>

        <button class="btn btn-primary" id="btnStartDraw" disabled>▶ 開始抽籤程序</button>
      </div>
    </div>

    <!-- 舞台區 -->
    <div id="stageArea" style="display: none;">
      <div class="mega-screen">
        <div class="draw-counter" id="drawProgress">0 / 0</div>
        <div class="mega-unit" id="dispUnit">單位名稱</div>
        <div class="mega-name" id="dispName">READY</div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 3px solid #dee2e6; padding-bottom: 15px;">
        <h2 style="font-weight: 900; letter-spacing: 2px;">🏆 本次抽中名冊</h2>
        <button class="btn btn-outline" onclick="exportResult()">💾 下載抽籤結果稽核檔</button>
      </div>
      <div class="winners-grid" id="winnersGrid"></div>
    </div>
  </main>

  <canvas id="confettiCanvas"></canvas>

<script>
  // ================= 狀態核心 =================
  const state = { fileHash: '', rows:[], unitsMap: {}, result:[], seed: '', isDrawing: false, hasDrawn: false };
  const el = id => document.getElementById(id);
  const sleep = ms => new Promise(res => setTimeout(res, ms));

  // 1. 初始化：自動載入測試名單
  window.addEventListener('DOMContentLoaded', () => { loadDemoData(); });

  // ================= 密碼學隨機演算法 (可重現結果) =================
  async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
  }
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i=0; i<str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = (h << 13) | (h >>> 19); }
    return function() { h = Math.imul(h ^ (h >>> 16), 2246822507); h = Math.imul(h ^ (h >>> 13), 3266489909); return (h ^= (h >>> 16)) >>> 0; }
  }
  function sfc32(a, b, c, d) {
    return function() {
      a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; let t = (a + b) | 0;
      a = b ^ (b >>> 9); b = (c + (c << 3)) | 0; c = (c << 21) | (c >>> 11); d = (d + 1) | 0;
      t = (t + d) | 0; c = (c + t) | 0; return (t >>> 0) / 4294967296;
    }
  }

  // ================= 音效與特效 =================
  let audioCtx = null;
  function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
  function playBeep(freq, type, dur, vol=0.08) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  }

  // 升級紙屑 Canvas
  const canvas = el('confettiCanvas'), ctx = canvas.getContext('2d');
  let particles = [];
  function fireConfetti() {
    particles = [];
    const colors = ['#D32F2F', '#1976D2', '#FFD600', '#ffffff'];
    for(let i=0; i<150; i++) {
      particles.push({
        x: canvas.width/2, y: canvas.height/2,
        vx: (Math.random()-0.5)*20, vy: (Math.random()-1)*20,
        size: Math.random()*8+4, color: colors[Math.floor(Math.random()*colors.length)],
        tilt: Math.random()*10, tiltAngle: 0, tiltAngleInc: Math.random()*0.1
      });
    }
    renderConfetti();
  }
  function renderConfetti() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let active = false;
    particles.forEach(p => {
      p.tiltAngle += p.tiltAngleInc; p.x += p.vx; p.vy += 0.4; p.y += p.vy;
      if(p.y <= canvas.height) active = true;
      ctx.beginPath(); ctx.lineWidth = p.size; ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.size, p.y); ctx.lineTo(p.x + p.tilt, p.y + p.size);
      ctx.stroke();
    });
    if(active) requestAnimationFrame(renderConfetti);
  }

  // ================= 資料處理 =================
  async function processCSV(text) {
    state.fileHash = (await sha256(text)).slice(0, 16);
    el('dashHash').textContent = state.fileHash;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    state.rows = []; state.unitsMap = {};
    for(let i=1; i<lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g, '').trim());
      if(cols.length >= 4) {
        const row = { unit: cols[0], branch: cols[1], id: cols[2], name: cols[3], title: cols[4] || '' };
        state.rows.push(row);
        if(!state.unitsMap[row.unit]) state.unitsMap[row.unit] = [];
        state.unitsMap[row.unit].push(row);
      }
    }
    renderQuotaPanel();
    applyGlobalQuota();
    el('btnStartDraw').disabled = false;
  }

  function renderQuotaPanel() {
    const container = el('quotaList'); container.innerHTML = '';
    Object.keys(state.unitsMap).forEach(unit => {
      const count = state.unitsMap[unit].length;
      const div = document.createElement('div'); div.className = 'quota-item';
      div.innerHTML = `<label><input type="checkbox" class="u-cb" value="${unit}" checked> ${unit} (${count}人)</label>
      <div style="font-weight:900;">抽 <input type="number" class="u-num" data-unit="${unit}" value="20" style="width:60px; text-align:center;"> 人</div>`;
      container.appendChild(div);
    });
  }

  function toggleAllUnits(chk) { document.querySelectorAll('.u-cb').forEach(c => c.checked = chk); }
  function applyGlobalQuota() {
    const num = parseInt(el('globalQuotaInput').value);
    document.querySelectorAll('.u-num').forEach(i => i.value = Math.min(num, state.unitsMap[i.dataset.unit].length));
  }

  function loadDemoData() {
    let csv = "大隊,分隊,員編,姓名,職稱\n";
    ["第一大隊","第二大隊","第三大隊","第四大隊"].forEach((u, idx) => {
      for(let i=1; i<=60; i++) { // 擴大母體避免名單不足
        csv += `${u},${u.charAt(0)}區分隊,TFD-${idx+1}-${String(i).padStart(3,'0')},測試人員${idx+1}-${i},隊員\n`;
      }
    });
    processCSV(csv);
  }

  // ================= 核心抽籤程序 =================
  el('btnStartDraw').addEventListener('click', async () => {
    if(state.hasDrawn && !confirm("已抽過籤，重抽會清除現有結果。確定嗎？")) return;
    initAudio();
    const tasks = [];
    document.querySelectorAll('.quota-item').forEach(item => {
      if(item.querySelector('.u-cb').checked && parseInt(item.querySelector('.u-num').value) > 0) {
        tasks.push({ unit: item.querySelector('.u-cb').value, count: parseInt(item.querySelector('.u-num').value) });
      }
    });
    if(tasks.length === 0) return alert("請設定單位與人數");

    state.result = []; el('winnersGrid').innerHTML = ''; el('stageArea').style.display = 'block';
    
    // Seed 處理
    const customSeed = el('seedInput').value.trim();
    state.seed = customSeed !== "" ? customSeed : ("TFD-" + Math.random().toString(36).substr(2,6).toUpperCase());
    el('dashSeed').textContent = state.seed; el('seedInput').value = state.seed;
    
    const gen = xmur3(state.seed); const rng = sfc32(gen(), gen(), gen(), gen());

    state.isDrawing = true;
    for(const task of tasks) {
      await runDraw(task.unit, task.count, rng);
    }
    
    el('dispName').textContent = "抽籤完畢"; el('dispName').classList.add('winner');
    fireConfetti(); playBeep(880, 'sine', 0.5); state.hasDrawn = true; state.isDrawing = false;
  });

  async function runDraw(unitName, count, rng) {
    const candidates = [...state.unitsMap[unitName]];
    // Fisher-Yates 洗牌 (保證不重複關鍵點)
    for(let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    const winners = candidates.slice(0, count);
    const turbo = el('turboMode').checked;

    el('dispUnit').textContent = `正在抽取：${unitName}`;
    el('dispName').classList.remove('winner');
    el('bigScreen').scrollIntoView({ behavior: 'smooth', block: 'center' });
    await sleep(600);

    for(let i=0; i<winners.length; i++) {
      const w = winners[i];
      state.result.push({ ...w, drawOrder: i+1 });
      el('drawProgress').textContent = `${i+1} / ${count}`;

      if(!turbo && i < 3) {
        // 前3名儀式感滾動
        for(let r=0; r<10; r++) {
          el('dispName').textContent = candidates[Math.floor(Math.random()*candidates.length)].name;
          await sleep(60);
        }
        el('dispName').textContent = w.name; el('dispName').classList.add('winner');
        playBeep(660, 'square', 0.2);
        const card = appendCard(w, i+1);
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        await sleep(1000); el('dispName').classList.remove('winner');
      } else {
        // 連抽模式
        el('dispName').textContent = w.name;
        playBeep(440, 'triangle', 0.05);
        const card = appendCard(w, i+1);
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        await sleep(turbo ? 50 : 200);
      }
    }
  }

  function appendCard(w, num) {
    const card = document.createElement('div');
    card.className = "card";
    card.innerHTML = `<span class="c-tag">#${String(num).padStart(2,'0')}</span>
    <div class="c-name">${w.name}</div><div class="c-unit">${w.branch} ${w.title}</div><div class="c-id">${w.id}</div>`;
    el('winnersGrid').appendChild(card);
    return card;
  }

  // ================= 匯出稽核 =================
  function exportResult() {
    if(state.result.length === 0) return;
    let csv = `\uFEFF--- 抽籤稽核資訊 ---\n`;
    csv += `抽籤時間,${new Date().toLocaleString()}\n`;
    csv += `母體清冊 HASH,${state.fileHash}\n`;
    csv += `抽籤驗證碼 SEED,${state.seed}\n\n`;
    csv += `大隊,序號,分隊,員編,姓名,職稱\n`;
    state.result.forEach(r => csv += `${r.unit},${r.drawOrder},${r.branch},${r.id},${r.name},${r.title}\n`);
    
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv;charset=utf-8-sig'}));
    a.download = `TFD_抽籤結果_${state.seed}.csv`; a.click();
  }

  function downloadSample() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(["\uFEFF大隊,分隊,員編,姓名,職稱\n第一大隊,城中分隊,A123,王大明,隊員"], {type: 'text/csv;charset=utf-8-sig'}));
    a.download = 'TFD_名冊範例.csv'; a.click();
  }
  
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
</script>
</body>
</html>
