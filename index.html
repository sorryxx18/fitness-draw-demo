<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>臺北市政府消防局 - 體能抽測抽籤系統 (盛典慶祝版)</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --tfd-red: #D32F2F;
      --tfd-blue: #1976D2;
      --tfd-gold: #FFC107;
      --bg-light: #F8F9FA;
      --text-dark: #1A1A1B;
      --font-main: 'Noto Sans TC', sans-serif;
      --font-num: 'Montserrat', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* 1. 流動感漸層背景與紅藍動態反光 */
    body {
      font-family: var(--font-main);
      color: var(--text-dark);
      min-height: 100vh;
      background: linear-gradient(-45deg, #ffffff, #f0f4f8, #e8f0f7, #ffffff);
      background-size: 400% 400%;
      animation: fluidGradient 12s ease infinite;
      overflow-x: hidden;
    }
    @keyframes fluidGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 5% 15%, rgba(211,47,47,0.07) 0%, transparent 35%),
                  radial-gradient(circle at 95% 85%, rgba(25,118,210,0.07) 0%, transparent 35%);
      pointer-events: none; z-index: -1;
    }

    /* 頂部官方 Header (白底俐落) */
    .header {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      padding: 12px 40px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      border-top: 6px solid var(--tfd-red);
      position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .logo-zone { display: flex; align-items: center; gap: 16px; }
    .logo-img { width: 50px; height: 50px; object-fit: contain; }
    .header-title h1 { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: #222; }
    .header-title p { font-size: 11px; color: var(--tfd-blue); font-family: var(--font-num); font-weight: 800; letter-spacing: 2px; }

    /* 數位看板 */
    .dashboard {
      display: flex; gap: 20px; font-family: var(--font-num); font-size: 12px;
      background: #f8f9fa; padding: 8px 20px; border-radius: 50px; border: 1px solid #dee2e6;
    }
    .dash-label { color: #666; font-weight: 700; }
    .dash-value { color: var(--tfd-red); font-weight: 900; margin-left: 4px; }

    .main-wrap { max-width: 1300px; margin: 30px auto; padding: 0 30px; }

    /* 控制面板 */
    .grid-layout { display: grid; grid-template-columns: 360px 1fr; gap: 24px; margin-bottom: 40px; }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(15px);
      border-radius: 20px; padding: 25px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    .panel-header { 
      font-size: 18px; font-weight: 900; color: #1a237e; margin-bottom: 20px; 
      border-left: 5px solid var(--tfd-red); padding-left: 14px;
    }

    /* 檔案與輸入 */
    .upload-area {
      border: 2px dashed #90a4ae; border-radius: 12px; padding: 25px; text-align: center;
      cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.4); margin-bottom: 20px; display: block;
    }
    .upload-area:hover { border-color: var(--tfd-blue); background: #f0f7ff; }
    #csvFileInput { display: none; }

    .btn { padding: 12px 18px; border-radius: 10px; font-weight: 800; cursor: pointer; border: none; transition: 0.3s; font-size: 14px; }
    .btn-main { 
      background: linear-gradient(135deg, var(--tfd-red), #b71c1c); color: white; 
      width: 100%; font-size: 18px; padding: 16px; margin-top: 20px; 
      box-shadow: 0 6px 15px rgba(211,47,47,0.25);
    }
    .btn-main:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(211,47,47,0.35); }
    .btn-main:disabled { background: #cfd8dc; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: #fff; border: 1px solid #cfd8dc; color: #455a64; }
    .btn-outline:hover { border-color: var(--tfd-blue); background: #f1f8ff; color: var(--tfd-blue); }

    input[type="number"], input[type="text"] {
      padding: 10px; border: 1px solid #cfd8dc; border-radius: 8px; outline: none; transition: 0.3s; font-family: var(--font-num);
    }
    input[type="number"]:focus, input[type="text"]:focus { border-color: var(--tfd-blue); box-shadow: 0 0 0 3px rgba(25,118,210,0.1); }

    /* 單位清單區 */
    .list-box { background: rgba(255,255,255,0.4); border-radius: 12px; padding: 15px; border: 1px solid #eef1f4; }
    .unit-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 15px; background: white; border-radius: 10px; margin-bottom: 10px;
      border: 1px solid #e1e4e8; transition: 0.2s;
    }
    .unit-item:hover { border-color: var(--tfd-blue); transform: translateX(5px); }

    /* 劇場大螢幕 */
    .stage-screen {
      width: 100%; max-width: 900px; margin: 0 auto 50px auto; aspect-ratio: 21/9;
      background: linear-gradient(135deg, #0a1128 0%, #001f3f 100%);
      border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25); position: relative; overflow: hidden;
      border: 3px solid rgba(255,255,255,0.1);
    }
    .stage-unit { font-size: 22px; color: #a2d2ff; letter-spacing: 6px; font-weight: 700; margin-bottom: 12px; z-index: 5; }
    .stage-name { font-size: 90px; font-weight: 900; color: white; letter-spacing: 4px; text-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 10; }
    .stage-name.active { color: var(--tfd-gold); text-shadow: 0 0 40px rgba(255,193,7,0.5); }
    .stage-counter { position: absolute; top: 20px; right: 30px; color: rgba(255,255,255,0.4); font-family: var(--font-num); font-weight: 900; font-size: 22px; }

    /* 結果展示牆 (直接亮牌) */
    .winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; padding-bottom: 120px; }
    .card {
      background: #ffffff; border-radius: 18px; padding: 22px; text-align: center;
      border-top: 6px solid var(--tfd-red); box-shadow: 0 8px 25px rgba(0,0,0,0.06);
      opacity: 0; transform: scale(0.6) translateY(50px);
      animation: popIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn { to { opacity: 1; transform: scale(1) translateY(0); } }
    .card-num { font-family: var(--font-num); font-weight: 900; font-size: 15px; color: var(--tfd-red); margin-bottom: 10px; display: inline-block; background: #ffebee; padding: 4px 14px; border-radius: 20px; }
    .card-name { font-size: 30px; font-weight: 900; color: #1A1A1B; margin-bottom: 6px; }
    .card-unit { font-size: 14px; color: #546e7a; font-weight: 700; }
    .card-id { font-family: var(--font-num); font-size: 13px; color: #b0bec5; margin-top: 15px; border-top: 1px dashed #e0e0e0; padding-top: 12px; }

    #confettiCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo-zone">
      <img src="./assets/logo.jpg" alt="TFD" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 50 50\'><circle cx=\'25\' cy=\'25\' r=\'24\' fill=\'%23D32F2F\'/><text x=\'50%\' y=\'50%\' fill=\'white\' font-size=\'14\' font-family=\'sans-serif\' font-weight=\'bold\' text-anchor=\'middle\' dy=\'.3em\'>TFD</text></svg>'">
      <div class="header-title">
        <h1>體能抽測抽籤系統</h1>
        <p>FIRE DEPARTMENT SELECTION SYSTEM</p>
      </div>
    </div>
    <div class="dashboard">
      <div><span class="dash-label">名冊 HASH:</span> <span id="dashHash" class="dash-value">---</span></div>
      <div><span class="dash-label">驗證 SEED:</span> <span id="dashSeed" class="dash-value">---</span></div>
    </div>
  </header>

  <main class="main-wrap">
    <div class="grid-layout">
      <!-- 面板 1 -->
      <div class="glass-card">
        <div class="panel-header">1. 數據與稽核管理</div>
        <label class="upload-area">
          <div style="font-size: 30px; margin-bottom: 10px;">📄</div>
          <div style="font-weight: 800; color: var(--tfd-blue);">匯入 CSV 名冊清單</div>
          <div style="font-size: 11px; color: #78909c; margin-top: 5px;">格式：大隊, 分隊, 員編, 姓名, 職稱</div>
          <input type="file" id="csvFileInput" accept=".csv">
        </label>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;">
          <button class="btn btn-outline" onclick="loadDemoData()">載入測試名冊</button>
          <button class="btn btn-outline" onclick="downloadSample()">下載 CSV 範例</button>
        </div>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #e9ecef;">
          <label style="font-size: 13px; font-weight: 900; color: var(--tfd-blue); margin-bottom: 8px; display: block;">🔑 設定驗證碼 (Seed)</label>
          <input type="text" id="seedInput" placeholder="輸入特定碼以鎖定結果..." style="width: 100%;">
          <p style="font-size: 10px; color: #90a4ae; margin-top: 8px;">※ 手動輸入相同代碼與名單，將產生相同抽籤結果。</p>
        </div>
      </div>

      <!-- 面板 2 -->
      <div class="glass-card">
        <div class="panel-header">2. 單位名額設定</div>
        <div style="display: flex; gap: 15px; align-items: center; background: #f1f3f5; padding: 12px 18px; border-radius: 12px; margin-bottom: 15px;">
          <label style="font-weight: 800; cursor: pointer;"><input type="checkbox" id="checkAllBtn" checked onchange="toggleAllUnits(this.checked)"> 全選單位</label>
          <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 13px; font-weight: 800;">抽取人數：</span>
            <input type="number" id="globalQuotaInput" value="20" min="1" style="width: 80px; text-align: center;">
            <button class="btn btn-outline" style="padding: 7px 15px;" onclick="applyGlobalQuota()">套用</button>
          </div>
          <label style="color: var(--tfd-red); font-weight: 800; cursor: pointer; padding-left: 15px; border-left: 1px solid #ddd;">
            <input type="checkbox" id="turboMode"> 極速模式
          </label>
        </div>

        <div class="list-box" id="quotaList">
          <div style="text-align: center; color: #b0bec5; padding: 30px;">等待資料載入...</div>
        </div>

        <button class="btn btn-main" id="btnStartDraw" disabled>▶ 開始正式抽籤作業</button>
      </div>
    </div>

    <!-- 展示舞台 -->
    <div id="stageArea" style="display: none;">
      <div class="stage-screen">
        <div class="stage-counter" id="drawProgress">0 / 0</div>
        <div class="stage-unit" id="dispUnit">單位名稱</div>
        <div class="stage-name" id="dispName">READY</div>
        <button id="skipBtn" style="position: absolute; bottom: 15px; right: 15px; font-size: 10px; background: rgba(255,255,255,0.1); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">SKIP</button>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 3px solid #dee2e6; padding-bottom: 15px;">
        <h2 style="font-weight: 900; letter-spacing: 2px;">🏆 本次抽中清冊</h2>
        <button class="btn btn-outline" style="font-size: 12px;" onclick="exportCSV()">💾 下載抽籤結果稽核檔</button>
      </div>
      <div class="winners-grid" id="winnersGrid"></div>
    </div>
  </main>

  <canvas id="confettiCanvas"></canvas>

<script>
  // ================= 核心邏輯 =================
  const state = { fileHash: '', rows: [], unitsMap: {}, result: [], seed: '', isDrawing: false, hasDrawn: false, skip: false };
  const el = id => document.getElementById(id);
  const sleep = ms => new Promise(res => setTimeout(res, ms));

  // 初始化：載入 Demo
  window.addEventListener('DOMContentLoaded', () => { loadDemoData(); });

  // ================= 嚴謹雜湊隨機數 =================
  async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
  }
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i=0; i<str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = (h << 13) | (h >>> 19); }
    return function() { h = Math.imul(h ^ (h >>> 16), 2246822507); h = Math.imul(h ^ (h >>> 13), 3266489909); return (h ^= (h >>> 16)) >>> 0; }
  }
  function sfc32(a, b, c, d) {
    return function() {
      a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; let t = (a + b) | 0;
      a = b ^ (b >>> 9); b = (c + (c << 3)) | 0; c = (c << 21) | (c >>> 11); d = (d + 1) | 0;
      t = (t + d) | 0; c = (c + t) | 0; return (t >>> 0) / 4294967296;
    }
  }

  // ================= 盛大音效與升級禮炮 =================
  let audioCtx = null;
  function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
  function playBeep(freq, type, dur, vol=0.08) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  }

  // 電子歡呼聲合成
  function playFanfare() {
    const tones = [523.25, 659.25, 783.99, 1046.50]; // C, E, G, C
    tones.forEach((t, i) => {
      setTimeout(() => playBeep(t, 'triangle', 0.6, 0.1), i * 150);
    });
    // 模擬掌聲 (白噪音脈衝)
    for(let i=0; i<10; i++) {
      setTimeout(() => {
        const noise = audioCtx.createBufferSource();
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let j=0; j<data.length; j++) data[j] = Math.random() * 2 - 1;
        noise.buffer = buffer;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        noise.connect(g); g.connect(audioCtx.destination);
        noise.start();
      }, 500 + i * 50);
    }
  }

  // Confetti 2.0 禮炮引擎
  const canvas = el('confettiCanvas'), ctx = canvas.getContext('2d');
  let particles = [];
  function fireGrandConfetti() {
    particles = [];
    const colors = ['#D32F2F', '#1976D2', '#FFC107', '#FFFFFF', '#000000'];
    // 三個發射源：左下、右下、底部中
    const launchers = [0.1, 0.5, 0.9];
    launchers.forEach(lx => {
      for(let i=0; i<100; i++) {
        particles.push({
          x: canvas.width * lx, y: canvas.height,
          vx: (lx === 0.5 ? (Math.random()-0.5)*15 : (lx < 0.5 ? Math.random()*20 : -Math.random()*20)),
          vy: -(Math.random() * 25 + 15),
          size: Math.random() * 10 + 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          wobble: Math.random() * 10,
          wobbleSpeed: Math.random() * 0.1 + 0.05,
          tiltAngle: Math.random() * Math.PI,
          shape: Math.random() > 0.4 ? 'rect' : 'circle'
        });
      }
    });
    requestAnimationFrame(renderConfetti);
  }

  function renderConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let active = false;
    particles.forEach(p => {
      p.tiltAngle += p.wobbleSpeed; p.x += p.vx; p.vy += 0.45; p.y += p.vy; p.vx *= 0.985;
      if (p.y <= canvas.height) active = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.tiltAngle);
      ctx.scale(Math.sin(p.tiltAngle), 1); // 模擬 3D 旋轉
      ctx.fillStyle = p.color;
      if(p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*1.3);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    if(active) requestAnimationFrame(renderConfetti);
  }

  // ================= 數據流 =================
  async function processCSV(text) {
    state.fileHash = (await sha256(text)).slice(0, 16);
    el('dashHash').textContent = state.fileHash;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    state.rows = []; state.unitsMap = {};
    for(let i=1; i<lines.length; i++) {
      const cols = lineParse(lines[i]);
      if(cols.length >= 4) {
        const row = { unit: cols[0], branch: cols[1], id: cols[2], name: cols[3], title: cols[4] || '' };
        state.rows.push(row);
        if(!state.unitsMap[row.unit]) state.unitsMap[row.unit] = [];
        state.unitsMap[row.unit].push(row);
      }
    }
    renderQuotaPanel(); el('btnStartDraw').disabled = false;
  }
  function lineParse(l) { return l.split(',').map(c => c.replace(/^"|"$/g, '').trim()); }

  function renderQuotaPanel() {
    const container = el('quotaList'); container.innerHTML = '';
    Object.keys(state.unitsMap).sort().forEach(unit => {
      const count = state.unitsMap[unit].length;
      const div = document.createElement('div'); div.className = 'unit-item';
      div.innerHTML = `<label><input type="checkbox" class="u-cb" value="${unit}" checked> ${unit} (${count}人)</label>
      <div style="font-weight:900;">抽 <input type="number" class="u-num" data-unit="${unit}" value="20" style="width:70px; text-align:center;"> 人</div>`;
      container.appendChild(div);
    });
  }

  function toggleAllUnits(chk) { document.querySelectorAll('.u-cb').forEach(c => c.checked = chk); }
  function applyGlobalQuota() {
    const num = parseInt(el('globalQuotaInput').value);
    document.querySelectorAll('.u-num').forEach(i => i.value = Math.min(num, state.unitsMap[i.dataset.unit].length));
  }

  function loadDemoData() {
    let csv = "大隊,分隊,員編,姓名,職稱\n";
    const last = ["陳","林","黃","張","李","王","吳","劉","蔡","楊","許","鄭","謝"];
    const first = ["家豪","冠廷","承翰","子軒","俊傑","彥廷","怡君","雅婷","欣怡","志偉"];
    ["第一大隊","第二大隊","第三大隊","第四大隊"].forEach((u, idx) => {
      for(let i=1; i<=60; i++) {
        const name = last[Math.floor(Math.random()*last.length)] + first[Math.floor(Math.random()*first.length)];
        csv += `${u},${u.charAt(0)}區分隊,TFD-${idx+1}-${String(i).padStart(3,'0')},${name},隊員\n`;
      }
    });
    processCSV(csv); applyGlobalQuota();
  }

  function downloadSample() {
    const b = new Blob(["\uFEFF大隊,分隊,員編,姓名,職稱\n第一大隊,城中分隊,A123,王大明,隊員"], {type: 'text/csv;charset=utf-8-sig'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = '範例名冊.csv'; a.click();
  }

  // ================= 正式抽籤 =================
  el('btnStartDraw').addEventListener('click', async () => {
    if(state.hasDrawn && !confirm("已抽過，重新開始將覆蓋結果？")) return;
    initAudio();
    const tasks = [];
    document.querySelectorAll('.unit-item').forEach(item => {
      if(item.querySelector('.u-cb').checked && parseInt(item.querySelector('.u-num').value) > 0) {
        tasks.push({ unit: item.querySelector('.u-cb').value, count: parseInt(item.querySelector('.u-num').value) });
      }
    });
    if(!tasks.length) return alert("請設定單位。");

    state.result = []; el('winnersGrid').innerHTML = ''; el('stageArea').style.display = 'block';
    
    const customSeed = el('seedInput').value.trim();
    state.seed = customSeed || ("TFD-" + Math.random().toString(36).substr(2,6).toUpperCase());
    el('dashSeed').textContent = state.seed; el('seedInput').value = state.seed;
    
    const gen = xmur3(state.seed); const rng = sfc32(gen(), gen(), gen(), gen());
    state.isDrawing = true; state.skip = false;

    for(const task of tasks) await runSequence(task.unit, task.count, rng);
    
    el('dispName').textContent = "抽籤圓滿完成"; el('dispName').classList.add('active');
    fireGrandConfetti(); playFanfare(); state.hasDrawn = true; state.isDrawing = false;
    el('btnStartDraw').disabled = false;
  });

  async function runSequence(unit, count, rng) {
    const pool = [...state.unitsMap[unit]];
    for(let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const wins = pool.slice(0, count);
    const turbo = el('turboMode').checked;

    el('dispUnit').textContent = `正在抽取：${unit}`;
    el('dispName').classList.remove('active');
    el('stageScreen').scrollIntoView({ behavior: 'smooth', block: 'center' });
    await sleep(800);

    for(let i=0; i<wins.length; i++) {
      const w = wins[i];
      state.result.push({ ...w, order: i+1 });
      el('drawProgress').textContent = `${i+1} / ${count}`;

      if(state.skip) { appendCard(w, i+1); continue; }

      if(!turbo && i < 3) {
        for(let r=0; r<12; r++) { el('dispName').textContent = pool[Math.floor(Math.random()*pool.length)].name; await sleep(60); }
        el('dispName').textContent = w.name; el('dispName').classList.add('active');
        playBeep(660, 'square', 0.2);
        const card = appendCard(w, i+1);
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        await sleep(1000); el('dispName').classList.remove('active');
      } else {
        el('dispName').textContent = w.name; playBeep(440, 'triangle', 0.05);
        const card = appendCard(w, i+1);
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        await sleep(turbo ? 50 : 200);
      }
    }
  }

  function appendCard(w, num) {
    const card = document.createElement('div');
    card.className = "card";
    card.innerHTML = `<span class="card-num">#${num}</span>
    <div class="card-name">${w.name}</div><div class="card-unit">${w.branch} ${w.title}</div><div class="card-id">${w.id}</div>`;
    el('winnersGrid').appendChild(card);
    return card;
  }

  el('skipBtn').onclick = () => state.skip = true;

  function exportCSV() {
    if(!state.result.length) return;
    let c = `\uFEFF--- 臺北市消防局體能抽測抽籤稽核證明 ---\n產出時間,${new Date().toLocaleString()}\nHASH,${state.fileHash}\nSEED,${state.seed}\n\n大隊,序號,分隊,員編,姓名,職稱\n`;
    state.result.forEach(r => c += `${r.unit},${r.order},${r.branch},${r.id},${r.name},${r.title}\n`);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([c], {type: 'text/csv;charset=utf-8-sig'}));
    a.download = `TFD抽籤結果_${state.seed}.csv`; a.click();
  }

  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  el('csvFileInput').onchange = e => e.target.files[0].text().then(processCSV);
</script>
</body>
</html>
