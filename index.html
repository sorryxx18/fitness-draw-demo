<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TFD 體能抽測抽籤系統 - 舞台劇場版</title>
  <style>
    :root {
      --bg-dark: #0a0a15;
      --bg-panel: #1a1a2e;
      --accent-red: #dc2626;
      --accent-blue: #2563eb;
      --accent-gold: #FFB300;
      --text-light: #f8fafc;
      --text-muted: #94a3b8;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a15 100%);
      color: var(--text-light);
      min-height: 100vh;
    }
    body::after{
      content:"";
      position: fixed;
      right: -120px;
      top: -80px;
      width: 520px;
      height: 520px;
      background: url("./assets/logo.jpg") center/cover no-repeat;
      opacity: .07;
      filter: saturate(1.25) contrast(1.1);
      transform: rotate(-10deg);
      pointer-events: none;
      mix-blend-mode: screen;
    }
    
    /* STAGE LAYOUT */
    .stage-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* HEADER */
    .stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;

    }
    .logo-zone { display: flex; align-items: center; gap: 12px; }
    .logo-badge{
      width: 56px;
      height: 56px;
      padding: 6px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(220,38,38,.35), rgba(37,99,235,.28));
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 14px 35px rgba(0,0,0,.55), 0 0 18px rgba(220,38,38,.20), 0 0 18px rgba(37,99,235,.18);
    }
    .logo-badge img{
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(0,0,0,.35);
    }

    .logo { height: 48px; width: auto; }
    .stage-header h1 { 
      font-size: 18px; 
      font-weight: 700; 
      color: var(--text-light); 
      letter-spacing: 2px; 
    }
    .audit-bar { 
      font-family: var(--font-mono); 
      font-size: 12px; 
      color: var(--text-muted); 
    }
    .audit-bar span { color: var(--accent-red); margin: 0 4px; }
    
    /* MAIN LOTTO SCREEN */
    .lotto-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      min-height: 50vh;
    }
    .brigade-badge {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      padding: 8px 24px;
      border: 1px solid var(--accent-gold);
      border-radius: 20px;
      background: rgba(255,179,0,0.1);
    }
    .big-display {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1e1e3f 0%, #0f0f23 100%);
      border: 2px solid rgba(220,38,38,0.3);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: 0 0 60px rgba(220,38,38,0.2), inset 0 0 60px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .display-label { font-size: 14px; color: var(--text-muted); letter-spacing: 2px; }
    .rolling-name {
      font-size: 72px;
      font-weight: 900;
      color: var(--text-light);
      text-shadow: 0 0 20px rgba(220,38,38,0.5);
      font-family: var(--font-mono);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .display-hint { font-size: 12px; color: var(--text-muted); }
    
    /* CONTROL PANEL */
    .control-panel {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }
    .input-group { display: flex; flex-direction: column; gap: 4px; }
    .input-group label { 
      font-size: 11px; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      letter-spacing: 1px; 
    }
    input[type="text"], input[type="number"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-light);
      padding: 10px 14px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      width: 120px;
      outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent-red);
    }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent-red);
      color: white;
    }
    .btn-primary:hover {
      background: #b91c1c;
      box-shadow: 0 0 20px rgba(220,38,38,0.4);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--text-light);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    
    /* WINNERS WALL */
    .winners-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .section-title {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .winners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .winner-card {
      background: linear-gradient(135deg, rgba(220,38,38,0.1) 0%, rgba(26,26,46,0.8) 100%);
      border: 1px solid rgba(220,38,38,0.3);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .winner-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(220,38,38,0.2);
    }


    /* DEAL + FLIP CARDS */
    .winner-card{
      perspective: 1000px;
      transform-style: preserve-3d;
      position: relative;
      min-height: 132px;
    }
    .winner-card .card-inner{
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
    }
    .winner-card.face-down .card-inner{ transform: rotateY(180deg); }
    .winner-card .card-front,
    .winner-card .card-back{
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
      overflow: hidden;
    }
    .winner-card .card-back{
      transform: rotateY(180deg);
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at 30% 20%, rgba(37,99,235,0.25), transparent 60%),
                  radial-gradient(circle at 70% 30%, rgba(220,38,38,0.22), transparent 55%),
                  linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0.35) 100%);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.45);
    }
    .winner-card .card-front{
      background: linear-gradient(135deg, rgba(220,38,38,0.10) 0%, rgba(26,26,46,0.8) 100%);
      border: 1px solid rgba(220,38,38,0.3);
      padding: 16px;
      box-sizing: border-box;
    }
    .card-back .back-mark{
      font-family: var(--font-mono);
      letter-spacing: 4px;
      color: rgba(255,255,255,0.65);
      font-weight: 900;
      text-shadow: 0 0 18px rgba(37,99,235,0.35);
    }

    .winner-card.is-active{
      outline: 2px solid rgba(255,179,0,0.65);
      box-shadow: 0 0 26px rgba(255,179,0,0.22), 0 0 18px rgba(220,38,38,0.18);
      transform: translateY(-2px) scale(1.02);
    }
    @keyframes pulse3{
      0%{ transform: scale(0.96); opacity: .55; }
      100%{ transform: scale(1.0); opacity: 1; }
    }
    .winner-brigade {
      font-size: 11px;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .winner-no {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent-red);
      font-family: var(--font-mono);
    }
    .winner-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-light);
      margin: 8px 0;
    }
    .winner-unit {
      font-size: 12px;
      color: var(--text-muted);
    }
    .winner-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
      margin-top: 4px;
    }
    
    /* CONFETTI */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
    
    /* RESPONSIVE */
    @media (max-width: 768px) {
      .rolling-name { font-size: 48px; }
      .big-display { max-width: 100%; }
      .control-panel { flex-direction: column; align-items: stretch; }
      .winners-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="stage-container">
    <!-- 頂部：極簡資訊區 -->
    <header class="stage-header">
      <div class="logo-zone">
        <div class="logo-badge">
          <img src="./assets/logo.jpg" alt="TFD Logo" />
        </div>
        <h1>TFD 體能抽測抽籤系統</h1>
      </div>
      <div class="audit-bar">
        Seed: <span id="kvSeed">-</span> | Time: <span id="kvTime">-</span> | SHA: <span id="kvHash">-</span>
      </div>
    </header>

    <!-- 中央：巨型抽籤螢幕 -->
    <main class="lotto-screen">
      <div class="brigade-badge" id="currentBrigade">準備就緒</div>
      <div class="big-display" id="bigDisplay">
        <div class="display-label" id="displayLabel">即將抽出...</div>
        <div class="rolling-name" id="rollingName">???</div>
        <div class="display-hint">點擊「開始抽籤」開始</div>
      </div>

      <!-- 控制區 -->
      <div class="control-panel">
        <div class="input-group">
          <label>每隊抽</label>
          <input type="number" id="pickCount" value="20" min="1" />
        </div>
        <div class="input-group">
          <label>Seed</label>
          <input type="text" id="seed" placeholder="留空自動生成" />
        </div>
        <button id="btnGen" class="btn-secondary">載入範例</button>
        <button id="btnDraw" class="btn-primary">開始抽籤</button>
        <button id="btnResult" class="btn-secondary">下載 CSV</button>
      </div>
    </main>

    <!-- 底部：得獎者展示牆 -->
    <section class="winners-section">
      <h2 class="section-title">抽中名單</h2>
      <div class="winners-grid" id="winnersGrid"></div>
    </section>
  </div>

  <canvas id="confetti-canvas"></canvas>

<script>
  // ---------- Sound Effects ----------
  let audioCtx = null;
  function initAudio() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, type, duration, vol=0.1) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }
  function playTick() { /* disabled in flip mode */ }
  function playFlip(){ playTone(420, 'triangle', 0.045, 0.04); setTimeout(()=>playTone(260, 'sine', 0.06, 0.03), 40); }

  function playLock() { playTone(800, 'square', 0.1, 0.05); setTimeout(()=>playTone(1200, 'square', 0.15, 0.05), 80); }
  function playSuccess() {
    playTone(523.25, 'triangle', 0.2, 0.1);
    setTimeout(()=>playTone(659.25, 'triangle', 0.2, 0.1), 150);
    setTimeout(()=>playTone(783.99, 'triangle', 0.4, 0.1), 300);
  }

  // ---------- Confetti ----------
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let particles = [];

  function fireConfetti() {
    const colors = ['#dc2626', '#2563eb', '#FFB300', '#10b981', '#ffffff'];
    for(let i=0; i<150; i++) {
      particles.push({
        x: canvas.width / 2, y: canvas.height / 2,
        vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 1) * 25 - 5,
        size: Math.random() * 10 + 5, color: colors[Math.floor(Math.random() * colors.length)],
        tilt: Math.floor(Math.random() * 10) - 10, tiltAngle: 0, tiltAngleInc: (Math.random() * 0.07) + 0.05
      });
    }
    requestAnimationFrame(renderConfetti);
  }

  function renderConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let active = false;
    for(let i=0; i<particles.length; i++) {
      const p = particles[i];
      p.tiltAngle += p.tiltAngleInc;
      p.y += (Math.cos(p.tiltAngle) + 1 + p.size / 2) / 2;
      p.x += Math.sin(p.tiltAngle) * 2 + p.vx;
      p.vy += 0.5;
      p.y += p.vy;

      if(p.y <= canvas.height) active = true;

      ctx.beginPath();
      ctx.lineWidth = p.size;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.size, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.size);
      ctx.stroke();
    }
    if(active) requestAnimationFrame(renderConfetti);
    else particles = [];
  }

  // ---------- RNG ----------
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i=0; i<str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function() {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= (h >>> 16)) >>> 0;
    }
  }
  function sfc32(a, b, c, d) {
    return function() {
      a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
      let t = (a + b) | 0;
      a = b ^ (b >>> 9);
      b = (c + (c << 3)) | 0;
      c = (c << 21) | (c >>> 11);
      d = (d + 1) | 0;
      t = (t + d) | 0;
      c = (c + t) | 0;
      return (t >>> 0) / 4294967296;
    }
  }
  function makeRng(seedText) {
    const seed = seedText && seedText.trim()
      ? seedText.trim()
      : (new Date().toISOString().slice(0,19).replace('T','_') + '_' + Math.random().toString(16).slice(2,6).toUpperCase());
    const gen = xmur3(seed);
    return { seed, rng: sfc32(gen(), gen(), gen(), gen()) };
  }

  // ---------- Data ----------
  const lastNames = ["陳","林","黃","張","李","王","吳","劉","蔡","楊","許","鄭","謝","郭","洪","曾","廖","賴","徐","周"];
  const firstNames = ["冠廷","承翰","子軒","柏宇","俊傑","家豪","宇辰","廷祐","哲維","昱翔","孟軒","建宏","彥廷",
                     "怡君","思妤","雅婷","佳穎","郁庭","語涵","品妍","鈺婷","婉如","子晴","佳蓉"];
  const titles = ["隊員","小隊長","分隊長","隊員","隊員","隊員","教官"];
  const unitMap = {
    '1': ["泉州分隊","建國分隊","城中分隊","雙園分隊","龍山分隊","螢橋分隊","木柵分隊","景美分隊","寶橋分隊","興隆分隊"],
    '2': ["信義分隊","南港分隊","大安分隊","莊敬分隊","安和分隊","復興分隊","舊莊分隊","金華分隊"],
    '3': ["圓山分隊","中山分隊","松江分隊","大直分隊","松山分隊","中崙分隊","八德分隊","民權分隊"],
    '4': ["劍潭分隊","大同分隊","後港分隊","社子分隊","天母分隊","福安分隊","士林分隊","石牌分隊","光明分隊","秀山分隊"]
  };
  const brigadeNames = { '1':'第一大隊', '2':'第二大隊', '3':'第三大隊', '4':'第四大隊' };

  function pad(n, w){ return String(n).padStart(w,'0'); }
  function randPick(arr, rng){ return arr[Math.floor(rng()*arr.length)]; }

  function genRoster(perBrigade=50, seedText=''){
    const {seed, rng} = makeRng(seedText || ('GEN_' + Date.now()));
    const rows=[];
    for(let b=1;b<=4;b++){
      const used=new Set();
      const units = unitMap[String(b)];
      for(let i=0;i<perBrigade;i++){
        let empId;
        do{ empId = String(b) + pad(Math.floor(rng()*10000),4); } while(used.has(empId));
        used.add(empId);
        const name = randPick(lastNames,rng) + randPick(firstNames,rng);
        rows.push({ brigade: String(b), unit: randPick(units,rng), empId, name, title: randPick(titles,rng) });
      }
    }
    return { seed, rows };
  }

  function toCSV(rows){
    const header = ['大隊','分隊','員編','姓名','職稱'];
    const lines=[header.join(',')];
    for(const r of rows){
      lines.push([r.brigade,r.unit,r.empId,r.name,r.title].map(x => '"'+String(x).replaceAll('"','""')+'"').join(','));
    }
    return lines.join('\n');
  }

  async function sha256(text){
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode(text));
    const arr = Array.from(new Uint8Array(buf));
    return arr.map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16).toUpperCase();
  }

  // ---------- State ----------
  const state = { rosterRows: [], rosterCSV: '', resultRows: [], resultCSV: '', drawSeed: '' };
  function el(id){ return document.getElementById(id); }

  function setFairPanel(){
    el('kvTime').textContent = new Date().toLocaleString('zh-TW');
    el('kvSeed').textContent = state.drawSeed || '-';
    el('kvHash').textContent = state.rosterCSV ? (state.rosterHash || '-') : '-';
  }

  // ---------- Draw Logic ----------
  function groupRows(){
    const g={};
    for(let b=1;b<=4;b++) g[String(b)]=[];
    for(const r of state.rosterRows){ if(g[r.brigade]) g[r.brigade].push(r); }
    return g;
  }

  function pickN(rows, n, rng){
    if(n>rows.length) throw new Error(`名單不足`);
    const arr = rows.slice();
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(rng()* (i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr.slice(0,n);
  }

  const sleep = ms => new Promise(res=>setTimeout(res, ms));

  async function runDraw(){
    const n = parseInt(el('pickCount').value,10);
    const { seed, rng } = makeRng(el('seed').value);
    state.drawSeed = seed;

    const groups = groupRows();
    for(let b=1;b<=4;b++){
      if(groups[String(b)].length < n){
        alert(`${brigadeNames[String(b)]} 母體人數 (${groups[String(b)].length}) 不足 ${n} 人，無法抽籤。`);
        return;
      }
    }

    setFairPanel();
    const resultRows=[];
    el('winnersGrid').innerHTML = '';

    for(let b=1;b<=4;b++){
      const key = String(b);
      const list = groups[key];
      const picked = pickN(list, n, rng);
      
      el('currentBrigade').textContent = `現在抽取：${brigadeNames[key]}`;
      el('displayLabel').textContent = "即將抽出...";
      el('rollingName').style.color = "var(--text-light)";
      el('rollingName').textContent = "準備";
      await sleep(120);
      // COUNTDOWN_321
      const cd = ['3','2','1'];
      for(const v of cd){
        el('displayLabel').textContent = '抽籤開始';
        el('rollingName').textContent = v;
        el('rollingName').style.color = 'var(--accent-gold)';
        el('rollingName').style.animation = 'pulse3 200ms ease-out';
        playFlip();
        await sleep(240);
        el('rollingName').style.animation = '';
      }
      el('rollingName').style.color = 'var(--text-light)';
      el('rollingName').textContent = "READY";
      await sleep(120);

      // Deal: pre-render all face-down cards first (instant)
      const cards = [];
      for(let i=0; i<picked.length; i++){
        const r = picked[i];
        const card = document.createElement('div');
        card.className = 'winner-card face-down';
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">
              <div class="winner-brigade">${brigadeNames[key]}</div>
              <div class="winner-no">#${String(i+1).padStart(2,'0')}</div>
              <div class="winner-name">${r.name}</div>
              <div class="winner-unit">${r.unit} ${r.title}</div>
              <div class="winner-id">${r.empId}</div>
            </div>
            <div class="card-back">
              <div class="back-mark">TFD</div>
            </div>
          </div>
        `;
        el('winnersGrid').appendChild(card);
        cards.push(card);
      }

      

      // One-time camera move: jump to winners wall before flipping
      el('winnersGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      await sleep(220);
// Flip: reveal one by one with focus + sound
      for(let i=0; i<picked.length; i++){
        const r = picked[i];
        el('displayLabel').textContent = `第 ${i+1}/${n} 位`;

        // micro-roll on big screen
        let rollTime = 120;
        let endTime = Date.now() + rollTime;
        await new Promise(resolve => {
          function roll(){
            if(Date.now() < endTime){
              el('rollingName').textContent = randPick(list, Math.random).name;
              requestAnimationFrame(roll);
            }else{
              el('rollingName').textContent = r.name;
              el('rollingName').style.color = "var(--accent-red)";
              resolve();
            }
          }
          roll();
        });

        // focus this card and flip
        const card = cards[i];
        // highlight focus (no per-card scrolling)
        if(i>0) cards[i-1].classList.remove('is-active');
        card.classList.add('is-active');
        playFlip();
        card.classList.remove('face-down');
        setTimeout(()=>playLock(), 60);

        resultRows.push({ brigade:key, no: i+1, unit:r.unit, empId:r.empId, name:r.name, title:r.title });

        await sleep(120);
        el('rollingName').style.color = "var(--text-light)";
      }
      await sleep(200);
    }

    // Done
    el('currentBrigade').textContent = "抽籤完畢";
    el('displayLabel').textContent = "MISSION ACCOMPLISHED";
    el('rollingName').textContent = "DONE";
    el('rollingName').style.color = "var(--accent-gold)";
    
    state.resultRows = resultRows;
    state.resultCSV = '\uFEFF' + toResultCSV(resultRows);

    fireConfetti();
    playSuccess();
  }

  function toResultCSV(rows){
    const header=['大隊','序號','分隊','員編','姓名','職稱'];
    const lines=[header.join(',')];
    for(const r of rows){
      const bn = brigadeNames[r.brigade] || r.brigade;
      lines.push([bn, r.no, r.unit, r.empId, r.name, r.title].map(x => '"'+String(x).replaceAll('"','""')+'"').join(','));
    }
    return lines.join('\n');
  }

  // ---------- Events ----------
  el('btnGen').addEventListener('click', async () => {
    const demo = genRoster(100);
    state.rosterRows = demo.rows;
    state.rosterCSV = toCSV(demo.rows);
    state.rosterHash = await sha256(state.rosterCSV);
    state.drawSeed = ''; el('seed').value = '';
    setFairPanel();

    el('btnGen').textContent = "重新生成完畢 ✓";
    setTimeout(() => el('btnGen').textContent = "載入範例", 1500);
  });

  el('btnDraw').addEventListener('click', async () => {
    initAudio();
    if(!state.rosterRows.length){ alert('母體名單為空，請先載入範例。'); return; }

    el('btnDraw').disabled = true;
    el('btnDraw').textContent = '抽籤進行中...';
    try{
      await runDraw();
      el('btnDraw').textContent = '重新抽籤';
    }finally{
      el('btnDraw').disabled = false;
    }
  });

  el('btnResult').addEventListener('click', () => {
    if(!state.resultCSV){ alert('請先執行抽籤作業。'); return; }
    const blob = new Blob([state.resultCSV], {type: 'text/csv;charset=utf-8-sig'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `TFD_DrawResult_${state.drawSeed}.csv`; a.click();
    URL.revokeObjectURL(url);
  });
</script>
</body>
</html>
