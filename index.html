<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>臺北市政府消防局 - 體能抽測抽籤系統 </title>
  
  <!-- 導入專業官方字型 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. 全域變數與色彩系統 (Design System)
       ========================================= */
    :root {
      --tfd-red: #D32F2F;
      --tfd-blue: #1976D2;
      --tfd-gold: #FFC107;
      --bg-light: #F8F9FA;
      --text-dark: #202124;
      --font-main: 'Noto Sans TC', sans-serif;
      --font-num: 'Montserrat', sans-serif;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    /* =========================================
       2. 背景與基礎排版 (Background & Layout)
       ========================================= */
    body {
      font-family: var(--font-main);
      color: var(--text-dark);
      min-height: 100vh;
      /* 動態流動漸層背景 */
      background: linear-gradient(125deg, #ffffff 0%, #f0f2f5 30%, #ffffff 60%, #e8eff7 100%);
      background-size: 400% 400%;
      animation: fluidMove 15s ease infinite;
      overflow-x: hidden;
      position: relative;
    }
    
    @keyframes fluidMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 左右紅藍反光特效 */
    body::before {
      content: ""; 
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(211,47,47,0.06) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(25,118,210,0.06) 0%, transparent 40%);
      pointer-events: none; 
      z-index: -1;
    }

    /* =========================================
       3. 頂部標題列 (Header)
       ========================================= */
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      padding: 14px 40px;
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      border-top: 6px solid var(--tfd-red);
      position: sticky; 
      top: 0; 
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .logo-zone { display: flex; align-items: center; gap: 18px; }
    .logo-img { width: 48px; height: 48px; object-fit: contain; }
    .header-title h1 { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #1a1a1a; }
    .header-title p { font-size: 11px; color: var(--tfd-blue); font-family: var(--font-num); font-weight: 800; letter-spacing: 2px; }

    /* 稽核資訊看板 */
    .audit-board {
      display: flex; 
      gap: 24px; 
      font-family: var(--font-num); 
      font-size: 12px;
      background: #f1f3f6; 
      padding: 10px 24px; 
      border-radius: 50px; 
      border: 1px solid #dcdfe3;
    }
    .audit-label { color: var(--text-dark); opacity: 0.6; font-weight: 700; }
    .audit-value { color: var(--tfd-red); font-weight: 900; margin-left: 6px; }

    /* =========================================
       4. 主控面板區塊 (Control Panels)
       ========================================= */
    .main-content { max-width: 1300px; margin: 30px auto; padding: 0 30px; }

    .control-grid { display: grid; grid-template-columns: 360px 1fr; gap: 30px; margin-bottom: 50px; }
    
    .panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(15px);
      border-radius: 20px; 
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }
    .panel-title { 
      font-size: 18px; font-weight: 900; color: #1a237e; margin-bottom: 20px; 
      border-left: 6px solid var(--tfd-red); padding-left: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .upload-box {
      border: 2px dashed #b0bec5; border-radius: 12px; padding: 30px 20px; text-align: center;
      cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.4); margin-bottom: 20px; display: block;
    }
    .upload-box:hover { border-color: var(--tfd-blue); background: rgba(25,118,210,0.04); }
    #csvFileInput { display: none; }

    /* 按鈕共用樣式 */
    .btn { 
      padding: 12px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; 
      border: none; transition: 0.3s; font-size: 14px; font-family: var(--font-main);
    }
    .btn-draw { 
      background: linear-gradient(135deg, var(--tfd-red), #b71c1c); color: white; 
      width: 100%; font-size: 18px; padding: 18px; margin-top: 20px; 
      box-shadow: 0 6px 20px rgba(211,47,47,0.3); letter-spacing: 2px;
    }
    .btn-draw:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(211,47,47,0.4); }
    .btn-draw:disabled { background: #cfd8dc; color: #90a4ae; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-outline { background: #fff; border: 1px solid #cfd8dc; color: #455a64; }
    .btn-outline:hover:not(:disabled) { border-color: var(--tfd-blue); color: var(--tfd-blue); background: #f1f8ff; }
    .btn-outline:disabled { background: #f8f9fa; color: #b0bec5; cursor: not-allowed; }

    /* 輸入框 */
    input[type="number"], input[type="text"] {
      padding: 12px; border: 1px solid #cfd8dc; border-radius: 10px; outline: none; 
      transition: 0.3s; font-family: var(--font-num);
    }
    input[type="number"]:focus, input[type="text"]:focus { 
      border-color: var(--tfd-blue); box-shadow: 0 0 0 4px rgba(25,118,210,0.1); 
    }

    /* =========================================
       5. 單位選取列表 (Quota List)
       ========================================= */
    .list-header { 
      display: flex; gap: 15px; align-items: center; background: #f1f3f5; 
      padding: 14px 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e9ecef;
    }
    .quota-list { 
      display: flex; flex-direction: column; gap: 10px; 
      max-height: 250px; overflow-y: auto; padding-right: 10px; 
    }
    .quota-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; background: white; border-radius: 12px;
      border: 1px solid #eef0f2; transition: 0.3s;
    }
    .quota-item:hover { transform: scale(1.02); border-color: var(--tfd-blue); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

    /* =========================================
       6. 劇場級大螢幕 (Mega Screen)
       ========================================= */
    .mega-screen {
      width: 100%; max-width: 900px; margin: 0 auto 50px auto; aspect-ratio: 21/9;
      background: linear-gradient(135deg, #0a1128 0%, #001f3f 100%);
      border-radius: 24px; display: flex; flex-direction: column; 
      align-items: center; justify-content: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.25); position: relative; overflow: hidden;
      border: 3px solid rgba(255,255,255,0.08);
    }
    .mega-screen::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(25,118,210,0.15) 0%, transparent 80%);
      pointer-events: none;
    }
    .mega-unit { font-size: 22px; color: #90caf9; letter-spacing: 6px; font-weight: 700; margin-bottom: 15px; z-index: 5; }
    .mega-name { font-size: 100px; font-weight: 900; color: white; letter-spacing: 4px; text-shadow: 0 0 30px rgba(255,255,255,0.2); z-index: 10; }
    .mega-name.highlight { color: var(--tfd-gold); text-shadow: 0 0 40px rgba(255, 193, 7, 0.5); }
    .mega-progress { position: absolute; top: 25px; right: 35px; color: rgba(255,255,255,0.3); font-family: var(--font-num); font-weight: 900; font-size: 20px; }
    
    .skip-btn { 
      position: absolute; bottom: 20px; right: 20px; font-size: 11px; padding: 6px 14px; 
      background: rgba(255,255,255,0.08); color: white; border: none; border-radius: 6px; 
      cursor: pointer; z-index: 20; 
    }
    .skip-btn:hover { background: var(--tfd-red); }

    /* =========================================
       7. 抽籤結果卡片牆 (Result Wall)
       ========================================= */
    .result-header {
      display: flex; justify-content: space-between; align-items: flex-end; 
      margin-bottom: 30px; border-bottom: 3px solid #dee2e6; padding-bottom: 18px;
    }
    .winners-grid { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
      gap: 24px; padding-bottom: 120px; 
    }
    .card {
      background: #ffffff; border-radius: 18px; padding: 22px; text-align: center;
      border-top: 6px solid var(--tfd-red); box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      opacity: 0; transform: scale(0.6) translateY(50px);
      animation: popOut 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      position: relative; overflow: hidden;
    }
    
    @keyframes popOut { 
      to { opacity: 1; transform: scale(1) translateY(0); } 
    }

    .c-tag { 
      font-family: var(--font-num); font-weight: 900; font-size: 14px; 
      color: var(--tfd-red); margin-bottom: 12px; display: inline-block; 
      background: #ffebee; padding: 4px 12px; border-radius: 20px; 
    }
    .c-name { font-size: 30px; font-weight: 900; color: #1a1a1a; margin-bottom: 6px; }
    .c-unit { font-size: 14px; color: #546e7a; font-weight: 700; }
    .c-id { 
      font-family: var(--font-num); font-size: 13px; color: #b0bec5; 
      margin-top: 15px; border-top: 1px dashed #e0e0e0; padding-top: 12px; 
    }

    #confettiCanvas { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      pointer-events: none; z-index: 9999; 
    }
  </style>
</head>
<body>

  <!-- ================= 頁面結構 ================= -->
  <header class="header">
    <div class="logo-zone">
      <!-- 官方 LOGO (若路徑遺失會自動帶入 SVG 預設圖) -->
      <img src="./assets/logo.jpg" alt="TFD" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 50 50\'><circle cx=\'25\' cy=\'25\' r=\'24\' fill=\'%23D32F2F\'/><text x=\'50%\' y=\'50%\' fill=\'white\' font-size=\'14\' font-family=\'sans-serif\' font-weight=\'bold\' text-anchor=\'middle\' dy=\'.3em\'>TFD</text></svg>'">
      <div class="header-title">
        <h1>體能抽測抽籤系統</h1>
        <p>TFD PHYSICAL PERFORMANCE LOTTERY</p>
      </div>
    </div>
    <div class="audit-board">
      <div><span class="audit-label">名冊 HASH:</span> <span id="dashHash" class="audit-value">尚未載入</span></div>
      <div><span class="audit-label">驗證 SEED:</span> <span id="dashSeed" class="audit-value">尚未產生</span></div>
    </div>
  </header>

  <main class="main-content">
    <div class="control-grid">
      
      <!-- 面板一：資料管理 -->
      <div class="panel">
        <div class="panel-title">1. 名冊管理與稽核</div>
        <label class="upload-box" id="uploadBoxLabel">
          <div style="font-size: 32px; margin-bottom: 10px;">📥</div>
          <div style="font-weight: 800; color: var(--tfd-blue);">點擊或拖曳上傳 CSV 清冊</div>
          <div style="font-size: 12px; color: #78909c; margin-top: 6px;">標準欄位：大隊, 分隊, 員編, 姓名, 職稱</div>
          <input type="file" id="csvFileInput" accept=".csv">
        </label>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px;">
          <button class="btn btn-outline" id="btnLoadDemo">✨ 載入測試名單</button>
          <button class="btn btn-outline" id="btnDownloadSample">📄 下載範例檔</button>
        </div>

        <div style="background: #f8f9fa; padding: 16px; border-radius: 12px; border: 1px solid #e9ecef;">
          <label style="font-size: 13px; font-weight: 900; color: var(--tfd-blue); margin-bottom: 8px; display: block;">🔑 指定驗證碼 (Seed)</label>
          <input type="text" id="seedInput" placeholder="若留空將由系統自動產生亂數" style="width: 100%;">
          <p style="font-size: 11px; color: #90a4ae; margin-top: 8px;">※ 只要名單與 Seed 相同，抽籤結果將永久固定可供重現稽核。</p>
        </div>
      </div>

      <!-- 面板二：單位名額設定 -->
      <div class="panel">
        <div class="panel-title">2. 單位名額設定</div>
        
        <div class="list-header">
          <label style="font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="checkAllBtn" checked> 全選單位
          </label>
          <div style="margin-left: auto; display: flex; align-items: center; gap: 12px;">
            <span style="font-size: 13px; font-weight: 800;">統一抽取人數：</span>
            <input type="number" id="globalQuotaInput" value="20" min="1" style="width: 85px; text-align: center;">
            <button class="btn btn-outline" id="btnApplyGlobal" style="padding: 8px 16px;">批次套用</button>
          </div>
          <label style="color: var(--tfd-red); font-weight: 800; cursor: pointer; padding-left: 15px; border-left: 1px solid #dee2e6;">
            <input type="checkbox" id="turboMode"> ⏩ 極速連抽
          </label>
        </div>

        <div class="quota-list" id="quotaList">
          <div style="text-align: center; color: #b0bec5; padding: 40px;">請匯入 CSV 清冊或載入測試名單</div>
        </div>

        <button class="btn btn-draw" id="btnStartDraw" disabled>▶ 開始執行抽測抽籤程序</button>
      </div>
    </div>

    <!-- 展示舞台區塊 -->
    <div id="stageArea" style="display: none;">
      
      <!-- 投影大螢幕 -->
      <div class="mega-screen" id="stageScreen">
        <div class="mega-progress" id="drawProgress">0 / 0</div>
        <div class="mega-unit" id="dispUnit">---</div>
        <div class="mega-name" id="dispName">READY</div>
        <button class="skip-btn" id="skipBtn">⏭ 跳過大螢幕動畫</button>
      </div>

      <!-- 抽中卡片牆 -->
      <div class="result-header">
        <h2 style="font-weight: 900; letter-spacing: 2px; color: #1a237e;">🏆 本次抽中名冊清單</h2>
        <button class="btn btn-outline" id="btnExportResult" style="font-size: 13px;">💾 下載抽籤稽核報告 (CSV)</button>
      </div>
      
      <div class="winners-grid" id="winnersGrid"></div>
    </div>
  </main>

  <!-- 禮炮特效畫布 -->
  <canvas id="confettiCanvas"></canvas>

<script>
  /* =========================================================================
     [系統狀態與 DOM 宣告]
     嚴謹宣告所有使用到的變數，避免全域污染。
  ========================================================================= */
  const state = {
    fileHash: '',       // 名冊 SHA-256
    rows:[],           // 完整名單
    unitsMap: {},       // 以單位分類的名單
    result:[],         // 抽出的結果
    seed: '',           // 當前使用的 Seed
    isDrawing: false,   // 是否正在抽籤中 (UI 防護鎖)
    skipAnimation: false, // 是否略過動畫
    hasDrawn: false     // 是否已經抽過 (防呆)
  };

  const UI = {
    csvFileInput: document.getElementById('csvFileInput'),
    dashHash: document.getElementById('dashHash'),
    dashSeed: document.getElementById('dashSeed'),
    seedInput: document.getElementById('seedInput'),
    quotaList: document.getElementById('quotaList'),
    checkAllBtn: document.getElementById('checkAllBtn'),
    globalQuotaInput: document.getElementById('globalQuotaInput'),
    btnApplyGlobal: document.getElementById('btnApplyGlobal'),
    turboMode: document.getElementById('turboMode'),
    btnStartDraw: document.getElementById('btnStartDraw'),
    stageArea: document.getElementById('stageArea'),
    stageScreen: document.getElementById('stageScreen'),
    drawProgress: document.getElementById('drawProgress'),
    dispUnit: document.getElementById('dispUnit'),
    dispName: document.getElementById('dispName'),
    skipBtn: document.getElementById('skipBtn'),
    winnersGrid: document.getElementById('winnersGrid'),
    btnExportResult: document.getElementById('btnExportResult'),
    btnLoadDemo: document.getElementById('btnLoadDemo'),
    btnDownloadSample: document.getElementById('btnDownloadSample'),
    // 所有操作按鈕 (用於在抽籤時上鎖)
    allInputs: document.querySelectorAll('input, button')
  };

  const sleep = ms => new Promise(res => setTimeout(res, ms));

  // 網頁離開防呆警告
  window.addEventListener('beforeunload', (e) => {
    if (state.isDrawing) {
      e.returnValue = '抽籤程序正在進行中，離開將遺失所有資料！';
    }
  });

  /* =========================================================================
     [初始化]
     頁面載入時，自動產生測試資料並設定就緒狀態
  ========================================================================= */
  window.addEventListener('DOMContentLoaded', () => { 
    loadDemoData(); 
  });


  /* =========================================================================[密碼學與隨機演算法] 
     這區塊保證抽籤的公平性與不可篡改性
  ========================================================================= */
  
  // 計算 SHA-256 數位指紋
  async function sha256(text) {
    try {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf))
                  .map(b => b.toString(16).padStart(2, '0'))
                  .join('').toUpperCase();
    } catch (err) {
      console.error("SHA256 計算失敗", err);
      return "HASH_ERROR";
    }
  }

  // xmur3 雜湊函數 (將字串 Seed 轉換為 32bit 整數種子)
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function() {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= (h >>> 16)) >>> 0;
    }
  }

  // sfc32 偽隨機數生成器 (PRNG)
  function sfc32(a, b, c, d) {
    return function() {
      a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; 
      let t = (a + b) | 0;
      a = b ^ (b >>> 9); 
      b = (c + (c << 3)) | 0; 
      c = (c << 21) | (c >>> 11); 
      d = (d + 1) | 0;
      t = (t + d) | 0; 
      c = (c + t) | 0; 
      return (t >>> 0) / 4294967296;
    }
  }

  /* =========================================================================[專業音效與紙屑物理引擎]
  ========================================================================= */
  let audioCtx = null;
  function initAudio() { 
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
    if(audioCtx.state === 'suspended') audioCtx.resume(); 
  }

  // 基礎音效合成器
  function playBeep(freq, type, dur, vol = 0.08) {
    try {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type; 
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
      osc.connect(gain); 
      gain.connect(audioCtx.destination);
      osc.start(); 
      osc.stop(audioCtx.currentTime + dur);
    } catch(e) { /* 忽略音效失敗 */ }
  }

  const sndCountdown = () => playBeep(330, 'square', 0.15, 0.05);
  const sndGo = () => playBeep(880, 'square', 0.4, 0.08);
  const sndPop = () => playBeep(440, 'triangle', 0.1, 0.06);
  
  // 電子歡呼與勝利和弦
  function playFanfare() {
    try {
      if(!audioCtx) return;
      const tones =[523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
      tones.forEach((t, i) => { setTimeout(() => playBeep(t, 'sine', 0.6, 0.1), i * 150); });
      
      // 白噪音模擬掌聲
      for(let i=0; i<15; i++) {
        setTimeout(() => {
          const noise = audioCtx.createBufferSource();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for(let j=0; j<data.length; j++) data[j] = Math.random() * 2 - 1;
          noise.buffer = buffer;
          const g = audioCtx.createGain();
          g.gain.setValueAtTime(0.04, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
          noise.connect(g); g.connect(audioCtx.destination);
          noise.start();
        }, 500 + i * 40);
      }
    } catch(e) { /* 忽略音效失敗 */ }
  }

  // 3D 物理禮炮引擎
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  let particles =[];
  let confettiAnimId = null;

  function fireGrandConfetti() {
    if(confettiAnimId) cancelAnimationFrame(confettiAnimId);
    particles =[];
    const colors =['#D32F2F', '#1976D2', '#FFC107', '#FFFFFF', '#000000'];
    const launchers =[0.1, 0.5, 0.9]; // 左下、中間、右下
    
    launchers.forEach(lx => {
      for(let i=0; i<80; i++) {
        particles.push({
          x: canvas.width * lx, 
          y: canvas.height,
          vx: (lx === 0.5 ? (Math.random()-0.5)*15 : (lx < 0.5 ? Math.random()*20 : -Math.random()*20)),
          vy: -(Math.random() * 25 + 15),
          size: Math.random() * 10 + 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          wobble: Math.random() * 10,
          wobbleSpeed: Math.random() * 0.1 + 0.05,
          tiltAngle: Math.random() * Math.PI,
          shape: Math.random() > 0.4 ? 'rect' : 'circle'
        });
      }
    });
    renderConfetti();
  }

  function renderConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let active = false;
    particles.forEach(p => {
      p.tiltAngle += p.wobbleSpeed; 
      p.x += p.vx; 
      p.vy += 0.45; // 重力
      p.y += p.vy; 
      p.vx *= 0.985; // 空氣阻力
      
      if (p.y <= canvas.height) active = true;
      
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.tiltAngle);
      ctx.scale(Math.sin(p.tiltAngle), 1); // 模擬 3D 翻轉
      ctx.fillStyle = p.color;
      if(p.shape === 'rect') {
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*1.3);
      } else { 
        ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); 
      }
      ctx.restore();
    });
    
    if(active) {
      confettiAnimId = requestAnimationFrame(renderConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }


  /* =========================================================================
     [CSV 解析與資料流處理] 
     嚴謹的防呆設計，處理逗號與換行
  ========================================================================= */
  
  // 嚴謹的 CSV 單行解析器 (支援處理雙引號內的逗號)
  function parseCSVRow(str) {
    const result =[];
    let curVal = '';
    let inQuotes = false;
    for (let i = 0; i < str.length; i++) {
      if (inQuotes) {
        if (str[i] === '"') {
          if (i + 1 < str.length && str[i + 1] === '"') { curVal += '"'; i++; } // 跳脫雙引號
          else { inQuotes = false; }
        } else { curVal += str[i]; }
      } else {
        if (str[i] === '"') { inQuotes = true; }
        else if (str[i] === ',') { result.push(curVal); curVal = ''; }
        else { curVal += str[i]; }
      }
    }
    result.push(curVal);
    return result.map(s => s.trim());
  }

  async function processCSV(text) {
    try {
      // 計算 Hash
      state.fileHash = (await sha256(text)).slice(0, 16);
      UI.dashHash.textContent = state.fileHash;
      
      const lines = text.split('\n').filter(l => l.trim().length > 0);
      if(lines.length < 2) throw new Error("檔案內容過少或沒有標題列。");
      
      state.rows =[]; 
      state.unitsMap = {};
      
      // 跳過標題列，從 i=1 開始
      for(let i=1; i<lines.length; i++) {
        const cols = parseCSVRow(lines[i]);
        if(cols.length >= 4) {
          const row = { 
            unit: cols[0] || '未分類', 
            branch: cols[1] || '', 
            id: cols[2] || '', 
            name: cols[3] || '', 
            title: cols[4] || '' 
          };
          state.rows.push(row);
          if(!state.unitsMap[row.unit]) state.unitsMap[row.unit] = [];
          state.unitsMap[row.unit].push(row);
        }
      }
      
      if (state.rows.length === 0) throw new Error("無法解析出有效的名單資料。");
      
      renderQuotaPanel(); 
      UI.btnStartDraw.disabled = false;
      
    } catch (err) {
      console.error(err);
      alert("解析名單時發生錯誤：" + err.message);
      UI.btnStartDraw.disabled = true;
    }
  }

  // 渲染動態面板
  function renderQuotaPanel() {
    UI.quotaList.innerHTML = '';
    
    // 按照單位名稱排序顯示
    Object.keys(state.unitsMap).sort().forEach(unit => {
      const count = state.unitsMap[unit].length;
      const div = document.createElement('div'); 
      div.className = 'quota-item';
      
      div.innerHTML = `
        <label style="cursor:pointer; display:flex; align-items:center; gap:10px; flex:1; font-weight:800;">
          <input type="checkbox" class="u-cb" value="${unit}" checked> ${unit}
          <span style="font-size:12px; font-weight:normal; color:#90a4ae;">(母體 ${count} 人)</span>
        </label>
        <div style="font-weight:900;">
          抽取 
          <input type="number" class="u-num" data-unit="${unit}" value="20" min="0" max="${count}" 
                 oninput="if(this.value>this.max)this.value=this.max;if(this.value<0)this.value=0;" 
                 style="width:75px; text-align:center;"> 
          人
        </div>
      `;
      UI.quotaList.appendChild(div);
    });
    
    // 渲染完畢自動套用全域設定
    applyGlobalQuota();
  }

  // 檔案事件
  UI.csvFileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return; // 使用者按取消
    try {
      const text = await file.text();
      await processCSV(text);
    } catch (err) {
      alert("讀取檔案失敗：" + err.message);
    }
    e.target.value = ''; // 允許重複上傳相同檔案
  });


  /* =========================================================================
     [UI 互動與控制按鈕]
  ========================================================================= */
  
  UI.checkAllBtn.addEventListener('change', (e) => {
    document.querySelectorAll('.u-cb').forEach(c => c.checked = e.target.checked);
  });

  UI.btnApplyGlobal.addEventListener('click', applyGlobalQuota);

  function applyGlobalQuota() {
    const num = parseInt(UI.globalQuotaInput.value, 10);
    if(isNaN(num) || num < 0) return alert('請輸入有效的數字');
    
    document.querySelectorAll('.u-num').forEach(input => {
      const max = parseInt(input.getAttribute('max'), 10);
      input.value = Math.min(num, max);
    });
    UI.checkAllBtn.checked = true;
    document.querySelectorAll('.u-cb').forEach(c => c.checked = true);
  }

  UI.btnLoadDemo.addEventListener('click', loadDemoData);
  
  function loadDemoData() {
    let csv = "大隊,分隊,員編,姓名,職稱\n";
    const last =["陳","林","黃","張","李","王","吳","劉","蔡","楊","許","鄭","謝","郭","洪"];
    const first =["家豪","冠廷","承翰","子軒","俊傑","彥廷","怡君","雅婷","欣怡","志偉","建宏"];["第一大隊","第二大隊","第三大隊","第四大隊"].forEach((u, idx) => {
      for(let i=1; i<=80; i++) {
        const name = last[Math.floor(Math.random()*last.length)] + first[Math.floor(Math.random()*first.length)];
        csv += `${u},${u.charAt(0)}區分隊,TFD-${idx+1}-${String(i).padStart(3,'0')},${name},隊員\n`;
      }
    });
    processCSV(csv);
  }

  UI.btnDownloadSample.addEventListener('click', () => {
    // 加入 BOM 解決 Excel 中文亂碼
    const content = "\uFEFF大隊,分隊,員編,姓名,職稱\n第一大隊,城中分隊,A1001,王大明,隊員\n第二大隊,信義分隊,B2001,陳小華,小隊長";
    const blob = new Blob([content], {type: 'text/csv;charset=utf-8-sig'});
    const a = document.createElement('a'); 
    a.href = URL.createObjectURL(blob); 
    a.download = 'TFD_名冊公版範例.csv'; 
    a.click();
  });


  /* =========================================================================
     [核心抽籤邏輯與大螢幕控制]
  ========================================================================= */
  
  // 鎖定 UI 避免抽籤中誤觸
  function lockUI(locked) {
    state.isDrawing = locked;
    document.querySelectorAll('input, button').forEach(el => {
      // 排除「跳過按鈕」
      if(el.id !== 'skipBtn') el.disabled = locked;
    });
  }

  UI.btnStartDraw.addEventListener('click', async () => {
    // 防呆確認
    if(state.hasDrawn && !confirm("您已經抽過籤了，重新啟動將會【覆蓋現有名單】。確定要重新抽籤嗎？")) return;
    
    // 初始化音效 (必須在使用者點擊事件內執行)
    initAudio();
    
    // 收集勾選的任務
    const tasks =[];
    document.querySelectorAll('.quota-item').forEach(item => {
      const isChecked = item.querySelector('.u-cb').checked;
      const quotaStr = item.querySelector('.u-num').value;
      const count = parseInt(quotaStr, 10);
      if(isChecked && count > 0) {
        tasks.push({ unit: item.querySelector('.u-cb').value, count: count });
      }
    });
    
    if(tasks.length === 0) return alert("請至少勾選一個單位，並設定大於 0 的人數。");

    // UI 狀態切換
    lockUI(true);
    UI.stageArea.style.display = 'block';
    UI.winnersGrid.innerHTML = '';
    state.skipAnimation = false; 
    state.result =[];

    // 處理 Seed 稽核碼
    const customSeed = UI.seedInput.value.trim();
    // 如果留空，自動產生亂碼。否則使用使用者指定的密碼。
    state.seed = customSeed !== "" ? customSeed : ("TFD-" + Math.random().toString(36).substr(2,6).toUpperCase());
    
    // 回填介面
    UI.dashSeed.textContent = state.seed; 
    UI.seedInput.value = state.seed;
    
    // 產生 PRNG 實例 (整個抽籤過程共用同一個 PRNG，確保連續亂數序列可重現)
    const gen = xmur3(state.seed); 
    const rng = sfc32(gen(), gen(), gen(), gen());

    try {
      // 逐一處理每個大隊
      for(const task of tasks) {
        await runDrawStep(task.unit, task.count, rng);
      }
      
      // 完成慶祝
      UI.dispName.textContent = "抽籤圓滿完成"; 
      UI.dispName.classList.add('highlight');
      UI.drawProgress.textContent = "DONE";
      
      fireGrandConfetti(); 
      playFanfare(); 
      state.hasDrawn = true;
      
    } catch (error) {
      console.error(error);
      alert("抽籤過程中發生非預期錯誤：" + error.message);
    } finally {
      lockUI(false);
    }
  });

  UI.skipBtn.addEventListener('click', () => { state.skipAnimation = true; });

  async function runDrawStep(unitName, count, rng) {
    // 1. 複製該單位的名單，避免修改原始資料
    const candidates =[...state.unitsMap[unitName]];
    
    // 2. 絕對公平的 Fisher-Yates 洗牌演算法 (嚴謹防重複)
    for(let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    
    // 3. 擷取前 N 名作為得獎者
    const winners = candidates.slice(0, count);
    const isTurbo = UI.turboMode.checked;

    // 更新大螢幕準備狀態
    UI.dispUnit.textContent = `現在抽取：${unitName}`;
    UI.dispName.classList.remove('highlight');
    UI.stageScreen.scrollIntoView({ behavior: 'smooth', block: 'center' });
    await sleep(800);

    // 儀式感倒數
    if(!isTurbo && !state.skipAnimation) {
      for(const v of['3', '2', '1']) {
        if(state.skipAnimation) break;
        UI.dispName.textContent = v; 
        sndCountdown(); 
        await sleep(700);
      }
      if(!state.skipAnimation) { 
        UI.dispName.textContent = "GO!"; 
        sndGo(); 
        await sleep(500); 
      }
    }

    // 逐一彈出亮牌
    for(let i=0; i<winners.length; i++) {
      const winner = winners[i];
      // 寫入最終結果陣列 (用於匯出)
      state.result.push({ ...winner, order: i + 1 });
      UI.drawProgress.textContent = `進度: ${i + 1} / ${count}`;

      if(state.skipAnimation) {
        appendWinnerCard(winner, i + 1);
        continue; // 略過等待直接下一個
      }

      if(!isTurbo && i < 3) {
        // 前 3 名：名字跑動特效
        for(let r=0; r<12; r++) {
          UI.dispName.textContent = candidates[Math.floor(Math.random()*candidates.length)].name;
          await sleep(60);
        }
        
        UI.dispName.textContent = winner.name; 
        UI.dispName.classList.add('highlight');
        sndPop();
        
        const card = appendWinnerCard(winner, i + 1);
        card.scrollIntoView({ behavior: 'smooth', block: 'center' }); // 完美畫面追蹤
        
        await sleep(1200); 
        UI.dispName.classList.remove('highlight');
      } else {
        // 極速連抽
        UI.dispName.textContent = winner.name;
        sndPop();
        
        const card = appendWinnerCard(winner, i + 1);
        card.scrollIntoView({ behavior: 'smooth', block: 'center' }); // 完美畫面追蹤
        
        await sleep(isTurbo ? 60 : 250);
      }
    }
  }

  // 將得獎卡片加入 DOM
  function appendWinnerCard(w, num) {
    const card = document.createElement('div');
    card.className = "card";
    
    // 預防 XSS：建立文字節點而非直接使用 innerHTML 塞入未知字串
    // (實務上這是極度嚴謹的做法)
    const escapeHTML = str => {
      const div = document.createElement('div');
      div.innerText = str;
      return div.innerHTML;
    };

    card.innerHTML = `
      <span class="c-tag">抽中序列 #${num}</span>
      <div class="c-name">${escapeHTML(w.name)}</div>
      <div class="c-unit">${escapeHTML(w.branch)} ${escapeHTML(w.title)}</div>
      <div class="c-id">${escapeHTML(w.id)}</div>
    `;
    
    UI.winnersGrid.appendChild(card);
    return card;
  }


  /* =========================================================================
     [CSV 安全匯出]
     確保匯出的 CSV 不會因為字串內有逗號而壞掉
  ========================================================================= */
  
  function escapeCSV(val) {
    if (val == null) return '""';
    const str = String(val);
    // 如果字串包含逗號、換行或雙引號，則用雙引號包起來，並將內部雙引號跳脫
    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
      return `"${str.replace(/"/g, '""')}"`;
    }
    return str;
  }

  UI.btnExportResult.addEventListener('click', () => {
    if(state.result.length === 0) return alert("目前沒有可匯出的抽籤結果。");
    
    let csv = `\uFEFF--- 臺北市消防局體能抽測抽籤稽核證明 ---\n`;
    csv += `報告產出時間,${new Date().toLocaleString()}\n`;
    csv += `母體清冊 HASH (SHA-256),${state.fileHash}\n`;
    csv += `系統驗證碼 SEED,${state.seed}\n\n`;
    
    // CSV 標題列
    csv += `大隊,抽中序號,分隊,員編,姓名,職稱\n`;
    
    // 寫入每一列資料
    state.result.forEach(r => {
      csv += `${escapeCSV(r.unit)},${r.order},${escapeCSV(r.branch)},${escapeCSV(r.id)},${escapeCSV(r.name)},${escapeCSV(r.title)}\n`;
    });
    
    // 觸發下載
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8-sig'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `TFD_抽籤結果稽核檔_${state.seed}.csv`; 
    a.click();
  });

  /* =========================================================================
     [系統監聽與雜項]
  ========================================================================= */
  
  // 保持畫布與視窗大小同步
  window.addEventListener('resize', () => { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
  });
  canvas.width = window.innerWidth; 
  canvas.height = window.innerHeight;

</script>
