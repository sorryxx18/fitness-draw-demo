<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFD 體能抽測抽籤系統</title>
    
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(214.3 31.8% 91.4%)",
                        input: "hsl(214.3 31.8% 91.4%)",
                        ring: "hsl(222.2 84% 4.9%)",
                        background: "hsl(0 0% 100%)",
                        foreground: "hsl(222.2 84% 4.9%)",
                        primary: {
                            DEFAULT: "hsl(222.2 47.4% 11.2%)",
                            foreground: "hsl(210 40% 98%)",
                        },
                        muted: {
                            DEFAULT: "hsl(210 40% 96.1%)",
                            foreground: "hsl(215.4 16.3% 46.9%)",
                        }
                    }
                }
            }
        }
    </script>

    <!-- 載入 React, ReactDOM 與 Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-foreground min-h-screen flex flex-col font-sans">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG 圖示組件 ---
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        function App() {
            // --- 狀態管理 ---
            const[activeTab, setActiveTab] = useState('draw');
            const [roster, setRoster] = useState("第一大隊-張三\n第一大隊-李四\n第二大隊-王五\n第二大隊-趙六\n第三大隊-陳七\n第三大隊-林八\n第四大隊-黃九\n第四大隊-吳十");
            const[drawCount, setDrawCount] = useState(2);
            const [isDrawing, setIsDrawing] = useState(false);
            const[tempName, setTempName] = useState("");
            const [currentResult, setCurrentResult] = useState(null);
            const [history, setHistory] = useState([]);

            // 解析有效名單
            const getValidList = () => roster.split('\n').map(s => s.trim()).filter(Boolean);

            // --- 抽籤邏輯 ---
            const handleDraw = () => {
                const list = getValidList();
                if (list.length === 0) return alert("請先至「名單管理」輸入名單！");
                if (drawCount < 1) return alert("抽籤人數必須大於 0！");
                if (drawCount > list.length) return alert(`名單只有 ${list.length} 人，無法抽出 ${drawCount} 人！`);

                setIsDrawing(true);
                setCurrentResult(null);

                // 動畫效果：快速跳動名字
                let counter = 0;
                const interval = setInterval(() => {
                    setTempName(list[Math.floor(Math.random() * list.length)]);
                    counter++;
                    
                    // 動畫結束，產出最終結果
                    if (counter > 20) {
                        clearInterval(interval);
                        
                        // 使用 Fisher-Yates 洗牌演算法確保不重複
                        let shuffled = [...list];
                        for (let i = shuffled.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                        }
                        
                        const selected = shuffled.slice(0, drawCount);
                        setCurrentResult(selected);
                        setTempName("");
                        setIsDrawing(false);
                        
                        // 寫入歷史紀錄
                        setHistory(prev =>[{
                            id: Date.now(),
                            time: new Date().toLocaleTimeString('zh-TW', { hour12: false }),
                            results: selected
                        }, ...prev]);
                    }
                }, 50); // 每 50ms 跳動一次
            };

            // --- 渲染區塊 ---
            return (
                <div className="max-w-3xl w-full mx-auto p-4 md:p-8 flex-grow flex flex-col">
                    {/* Header */}
                    <div className="text-center mb-8 pt-8">
                        <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight text-primary mb-2">
                            TFD 體能抽測系統
                        </h1>
                        <p className="text-muted-foreground text-sm md:text-base">公平、公開、隨機的數位抽籤平台</p>
                    </div>

                    {/* Tabs */}
                    <div className="flex bg-muted p-1 rounded-lg mb-6 shadow-sm">
                        <button 
                            onClick={() => setActiveTab('draw')}
                            className={`flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-medium rounded-md transition-all ${activeTab === 'draw' ? 'bg-white text-primary shadow' : 'text-muted-foreground hover:text-primary'}`}
                        >
                            <IconPlay /> 抽籤作業
                        </button>
                        <button 
                            onClick={() => setActiveTab('roster')}
                            className={`flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-medium rounded-md transition-all ${activeTab === 'roster' ? 'bg-white text-primary shadow' : 'text-muted-foreground hover:text-primary'}`}
                        >
                            <IconUsers /> 名單管理
                            <span className="bg-primary text-primary-foreground text-xs px-2 py-0.5 rounded-full ml-1">{getValidList().length}</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('history')}
                            className={`flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-medium rounded-md transition-all ${activeTab === 'history' ? 'bg-white text-primary shadow' : 'text-muted-foreground hover:text-primary'}`}
                        >
                            <IconHistory /> 歷史紀錄
                        </button>
                    </div>

                    {/* 內容區域：名單管理 */}
                    {activeTab === 'roster' && (
                        <div className="bg-white border rounded-xl shadow-sm p-6 animate-in fade-in slide-in-from-bottom-2 duration-300">
                            <h2 className="text-lg font-semibold mb-4">抽測人員名單</h2>
                            <p className="text-sm text-muted-foreground mb-4">請在下方輸入參與抽籤的人員名單，每行輸入一名（例如：分隊-姓名）。空白行將被自動忽略。</p>
                            <textarea 
                                className="w-full h-64 p-4 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all resize-none"
                                value={roster}
                                onChange={(e) => setRoster(e.target.value)}
                                placeholder="請輸入名單..."
                            ></textarea>
                            <div className="mt-4 flex justify-between items-center text-sm">
                                <span className="text-muted-foreground">目前有效人數：<strong className="text-primary">{getValidList().length}</strong> 人</span>
                                <button onClick={() => setRoster('')} className="text-red-500 hover:text-red-700 font-medium transition flex items-center gap-1">
                                    <IconTrash /> 清空名單
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 內容區域：抽籤作業 */}
                    {activeTab === 'draw' && (
                        <div className="bg-white border rounded-xl shadow-sm p-6 md:p-10 text-center animate-in fade-in slide-in-from-bottom-2 duration-300 flex flex-col items-center">
                            <div className="w-full max-w-sm mx-auto mb-8 bg-slate-50 p-6 rounded-xl border">
                                <label className="block text-sm font-medium text-slate-700 mb-2">本次欲抽出人數</label>
                                <div className="flex items-center justify-center gap-4">
                                    <button onClick={() => setDrawCount(Math.max(1, drawCount - 1))} className="w-10 h-10 rounded-full border bg-white hover:bg-slate-100 flex items-center justify-center text-xl font-medium transition">-</button>
                                    <input 
                                        type="number" 
                                        min="1" 
                                        className="w-20 text-center text-2xl font-bold p-2 border rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                                        value={drawCount}
                                        onChange={(e) => setDrawCount(parseInt(e.target.value) || 1)}
                                    />
                                    <button onClick={() => setDrawCount(drawCount + 1)} className="w-10 h-10 rounded-full border bg-white hover:bg-slate-100 flex items-center justify-center text-xl font-medium transition">+</button>
                                </div>
                                <p className="text-xs text-muted-foreground mt-3">從 {getValidList().length} 人中隨機抽出</p>
                            </div>

                            <button 
                                onClick={handleDraw}
                                disabled={isDrawing || getValidList().length === 0}
                                className={`w-full max-w-sm py-4 rounded-xl text-lg font-bold shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2
                                    ${isDrawing ? 'bg-slate-400 cursor-not-allowed' : 'bg-primary text-primary-foreground hover:bg-primary/90 hover:shadow-xl'}`}
                            >
                                {isDrawing ? (
                                    <><svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 洗牌中...</>
                                ) : (
                                    <><IconPlay /> 開始抽測</>
                                )}
                            </button>

                            {/* 抽籤跳動動畫區 */}
                            {isDrawing && (
                                <div className="mt-10 p-8 w-full border-2 border-dashed border-primary/30 rounded-2xl bg-primary/5">
                                    <p className="text-3xl md:text-5xl font-black text-primary/80 tracking-widest">{tempName}</p>
                                </div>
                            )}

                            {/* 抽籤結果顯示區 */}
                            {currentResult && !isDrawing && (
                                <div className="mt-10 w-full animate-in zoom-in-95 duration-500">
                                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center justify-center gap-2">
                                        🎉 本次抽測名單 🎉
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {currentResult.map((name, idx) => (
                                            <div key={idx} className="bg-green-50 border border-green-200 p-4 rounded-lg shadow-sm flex items-center justify-between">
                                                <span className="text-green-800 font-bold text-lg">{name}</span>
                                                <span className="bg-green-200 text-green-800 text-xs px-2 py-1 rounded font-mono">#{idx + 1}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 內容區域：歷史紀錄 */}
                    {activeTab === 'history' && (
                        <div className="bg-white border rounded-xl shadow-sm p-6 animate-in fade-in slide-in-from-bottom-2 duration-300">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-lg font-semibold">抽測歷史紀錄</h2>
                                {history.length > 0 && (
                                    <button onClick={() => {if(window.confirm('確定要清除所有紀錄嗎？')) setHistory([])}} className="text-sm text-red-500 hover:text-red-700 flex items-center gap-1 transition">
                                        <IconTrash /> 清除全部
                                    </button>
                                )}
                            </div>
                            
                            {history.length === 0 ? (
                                <div className="text-center py-12 text-muted-foreground border-2 border-dashed rounded-lg">
                                    <IconHistory className="mx-auto h-8 w-8 mb-3 opacity-20" />
                                    <p>尚無抽籤紀錄</p>
                                </div>
                            ) : (
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                                    {history.map((record, i) => (
                                        <div key={record.id} className="border rounded-lg p-4 bg-slate-50 hover:bg-slate-100 transition">
                                            <div className="flex justify-between items-center mb-3 border-b pb-2">
                                                <span className="font-medium text-sm text-slate-500">第 {history.length - i} 次抽測</span>
                                                <span className="text-xs font-mono bg-slate-200 px-2 py-1 rounded text-slate-600">{record.time}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {record.results.map((name, idx) => (
                                                    <span key={idx} className="bg-white border shadow-sm px-3 py-1.5 rounded-md text-sm font-bold text-slate-800">
                                                        {name}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
