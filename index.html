<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>臺北市政府消防局 - 體能抽測抽籤系統</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. 全域變數與色彩系統
       ========================================= */
    :root {
      --tfd-red: #D32F2F;
      --tfd-blue: #1976D2;
      --tfd-green: #2E7D32;
      --tfd-orange: #F57C00;
      --tfd-gold: #FFC107;
      --bg-light: #F8F9FA;
      --text-dark: #202124;
      --font-main: 'Noto Sans TC', sans-serif;
      --font-num: 'Montserrat', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-main);
      color: var(--text-dark);
      min-height: 100vh;
      background: linear-gradient(125deg, #ffffff 0%, #f0f2f5 30%, #ffffff 60%, #e8eff7 100%);
      background-size: 400% 400%;
      animation: fluidMove 15s ease infinite;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes fluidMove { 
      0% { background-position: 0% 50%; } 
      50% { background-position: 100% 50%; } 
      100% { background-position: 0% 50%; } 
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(211,47,47,0.06) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(25,118,210,0.06) 0%, transparent 40%);
      pointer-events: none; z-index: -1;
    }

    /* =========================================
       2. 頂部標題列 (Header)
       ========================================= */
    .header {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
      padding: 14px 40px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.08); border-top: 6px solid var(--tfd-red);
      position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .logo-zone { display: flex; align-items: center; gap: 18px; }
    .logo-img { width: 48px; height: 48px; object-fit: contain; }
    .header-title h1 { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #1a1a1a; }
    .header-title p { font-size: 11px; color: var(--tfd-blue); font-family: var(--font-num); font-weight: 800; letter-spacing: 2px; }

    .audit-board {
      display: flex; gap: 24px; font-family: var(--font-num); font-size: 12px;
      background: #f1f3f6; padding: 10px 24px; border-radius: 50px; border: 1px solid #dcdfe3;
    }
    .audit-label { color: var(--text-dark); opacity: 0.6; font-weight: 700; }
    .audit-value { color: var(--tfd-red); font-weight: 900; margin-left: 6px; }

    /* =========================================
       3. 主控面板區塊
       ========================================= */
    .main-content { max-width: 1300px; margin: 30px auto; padding: 0 30px; }
    .control-grid { display: grid; grid-template-columns: 360px 1fr; gap: 30px; margin-bottom: 50px; }
    .panel {
      background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px);
      border-radius: 20px; padding: 28px; border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }
    .panel-title { font-size: 18px; font-weight: 900; color: #1a237e; margin-bottom: 20px; border-left: 6px solid var(--tfd-red); padding-left: 14px; }

    .upload-box {
      border: 2px dashed #b0bec5; border-radius: 12px; padding: 30px 20px; text-align: center;
      cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.4); margin-bottom: 20px; display: block;
    }
    .upload-box:hover { border-color: var(--tfd-blue); background: rgba(25,118,210,0.04); }
    #csvFileInput { display: none; }

    .btn { padding: 12px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; border: none; transition: 0.3s; font-size: 14px; }
    .btn-draw {
      background: linear-gradient(135deg, var(--tfd-red), #b71c1c); color: white; width: 100%;
      font-size: 18px; padding: 18px; margin-top: 20px; box-shadow: 0 6px 20px rgba(211,47,47,0.3); letter-spacing: 2px;
    }
    .btn-draw:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(211,47,47,0.4); }
    .btn-draw:disabled { background: #cfd8dc; color: #90a4ae; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: #fff; border: 1px solid #cfd8dc; color: #455a64; }
    .btn-outline:hover:not(:disabled) { border-color: var(--tfd-blue); color: var(--tfd-blue); background: #f1f8ff; }

    input[type="number"], input[type="text"], select { 
      padding: 10px; border: 1px solid #cfd8dc; border-radius: 8px; outline: none; transition: 0.3s; font-family: var(--font-num); font-weight: 800;
    }
    input[type="number"]:focus, input[type="text"]:focus { border-color: var(--tfd-blue); box-shadow: 0 0 0 4px rgba(25,118,210,0.1); }

    /* =========================================
       4. 單位名額設定 (Quota List)
       ========================================= */
    .list-header {
      display: flex; gap: 15px; align-items: center; background: #f1f3f5; padding: 14px 20px;
      border-radius: 12px; margin-bottom: 15px; border: 1px solid #e9ecef; flex-wrap: wrap;
    }
    .quota-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
    
    .quota-item {
      display: flex; flex-direction: column; gap: 10px; padding: 16px; background: white;
      border-radius: 12px; border: 1px solid #eef0f2; transition: 0.3s;
    }
    .quota-item:hover { border-color: var(--tfd-blue); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .q-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #e0e0e0; padding-bottom: 8px; margin-bottom: 4px; }
    .q-sub-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .badge-status { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 800; }
    .badge-pass { background: #e8f5e9; color: #2e7d32; }
    .badge-fail { background: #ffebee; color: #c62828; }

    /* =========================================
       5. 劇場級大螢幕
       ========================================= */
    .mega-screen {
      width: 100%; max-width: 900px; margin: 0 auto 50px auto; aspect-ratio: 21/9;
      background: linear-gradient(135deg, #0a1128 0%, #001f3f 100%); border-radius: 24px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.25); position: relative; overflow: hidden; border: 3px solid rgba(255,255,255,0.08);
    }
    .mega-screen::before {
      content: ""; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(25,118,210,0.15) 0%, transparent 80%); pointer-events: none;
    }
    .mega-unit { font-size: 24px; color: #90caf9; letter-spacing: 4px; font-weight: 700; margin-bottom: 15px; z-index: 5; }
    .mega-name { font-size: 90px; font-weight: 900; color: white; letter-spacing: 4px; text-shadow: 0 0 30px rgba(255,255,255,0.2); z-index: 10; text-align: center; }
    .mega-name.highlight { color: var(--tfd-gold); text-shadow: 0 0 40px rgba(255, 193, 7, 0.5); }
    .mega-progress { position: absolute; top: 25px; right: 35px; color: rgba(255,255,255,0.3); font-family: var(--font-num); font-weight: 900; font-size: 20px; }
    .skip-btn { position: absolute; bottom: 20px; right: 20px; font-size: 11px; padding: 6px 14px; background: rgba(255,255,255,0.08); color: white; border: none; border-radius: 6px; cursor: pointer; z-index: 20; }
    .skip-btn:hover { background: var(--tfd-red); }

    /* =========================================
       6. 抽籤結果卡片牆 (已修復吃字 Bug)
       ========================================= */
    .result-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 3px solid #dee2e6; padding-bottom: 18px; }
    .winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; padding-bottom: 120px; }

    .card {
      background: #ffffff; border-radius: 18px; padding: 22px; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06); position: relative; overflow: hidden;
      border-top: 6px solid var(--theme-color, var(--tfd-blue));
      
      /* 核心修復：預設必須是 Opacity 1，並使用 backwards 讓動畫接管延遲前的透明度 */
      opacity: 1; 
      transform: scale(1) translateY(0);
      animation: popOut 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; 
    }
    
    @keyframes popOut { 
      0% { opacity: 0; transform: scale(0.6) translateY(50px); } 
      100% { opacity: 1; transform: scale(1) translateY(0); } 
    }

    .c-tag { font-family: var(--font-num); font-weight: 900; font-size: 13px; color: var(--theme-color); margin-bottom: 12px; display: inline-block; background: var(--theme-bg); padding: 4px 10px; border-radius: 20px; }
    .c-status { position: absolute; top: 18px; right: 18px; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 10px; }
    .c-name { font-size: 28px; font-weight: 900; color: #1a1a1a; margin-bottom: 6px; }
    .c-unit { font-size: 14px; color: #546e7a; font-weight: 700; margin-bottom: 15px;}

    /* 重抽替換按鈕 */
    .c-redraw-btn {
      display: inline-block; padding: 6px 12px; font-size: 12px; font-weight: 800; color: #78909c; background: #f1f3f4;
      border: 1px dashed #cfd8dc; border-radius: 8px; cursor: pointer; transition: 0.2s; width: 100%;
    }
    .c-redraw-btn:hover { background: #ffebee; color: var(--tfd-red); border-color: var(--tfd-red); }

    /* Gacha 特效 (加入 !important 確保強制現形，不受覆蓋影響) */
    .card.is-active{ outline: 2px solid rgba(255, 193, 7, 0.85); box-shadow: 0 0 28px rgba(255,193,7,0.25); transform: translateY(-2px) scale(1.02); opacity: 1 !important; }
    .card.is-milestone{ outline: 2px solid rgba(255, 193, 7, 0.95); box-shadow: 0 0 36px rgba(255,193,7,0.35); animation: gachaPulse 220ms ease-out; opacity: 1 !important; }
    .card.is-jackpot{ outline: 2px solid rgba(255, 215, 0, 0.98); box-shadow: 0 0 46px rgba(255,215,0,0.45); animation: gachaJackpot 260ms ease-out; opacity: 1 !important; }
    @keyframes gachaPulse{ 0%{ transform: scale(1.02); } 60%{ transform: scale(1.06); } 100%{ transform: scale(1.02); } }
    @keyframes gachaJackpot{ 0%{ transform: scale(1.02); } 55%{ transform: scale(1.08); filter: brightness(1.2); } 100%{ transform: scale(1.02); } }

    #confettiCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; }

    @media (max-width: 768px) {
      .header{ padding: 12px 16px; flex-wrap: wrap; }
      .audit-board{ width: 100%; margin-top: 10px; font-size: 11px; }
      .control-grid{ grid-template-columns: 1fr; }
      .mega-screen{ aspect-ratio: 16/10; }
      .mega-name{ font-size: 48px; }
      .mega-unit{ font-size: 18px; }
      .list-header { flex-direction: column; align-items: flex-start; }
      .list-header > div { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo-zone">
      <img src="./assets/logo.jpg" alt="TFD" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 50 50\'><circle cx=\'25\' cy=\'25\' r=\'24\' fill=\'%23D32F2F\'/><text x=\'50%\' y=\'50%\' fill=\'white\' font-size=\'14\' font-family=\'sans-serif\' font-weight=\'bold\' text-anchor=\'middle\' dy=\'.3em\'>TFD</text></svg>'">
      <div class="header-title">
        <h1>體能抽測抽籤系統</h1>
        <p>TFD PHYSICAL PERFORMANCE LOTTERY</p>
      </div>
    </div>
    <div class="audit-board">
      <div><span class="audit-label">名冊 HASH:</span> <span id="dashHash" class="audit-value">尚未載入</span></div>
      <div><span class="audit-label">驗證 SEED:</span> <span id="dashSeed" class="audit-value">尚未產生</span></div>
    </div>
  </header>

  <main class="main-content">
    <div class="control-grid">
      
      <!-- 面板一：資料管理 -->
      <div class="panel">
        <div class="panel-title">1. 名單管理與稽核</div>
        <label class="upload-box" id="uploadBoxLabel">
          <div id="uploadIcon" style="font-size: 32px; margin-bottom: 10px;">📥</div>
          <div id="uploadTitle" style="font-weight: 800; color: var(--tfd-blue);">點擊或拖曳上傳 CSV 清冊</div>
          <div style="font-size: 12px; color: #78909c; margin-top: 6px;">欄位要求：大隊, 分隊, 職稱, 姓名, 測驗狀態(及格/不及格)</div>
          <input type="file" id="csvFileInput" accept=".csv">
        </label>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px;">
          <button class="btn btn-outline" id="btnLoadDemo">✨ 載入測試名單</button>
          <button class="btn btn-outline" id="btnDownloadSample">📄 下載公版範例</button>
        </div>

        <div style="background: #f8f9fa; padding: 16px; border-radius: 12px; border: 1px solid #e9ecef;">
          <label style="font-size: 13px; font-weight: 900; color: var(--tfd-blue); margin-bottom: 8px; display: block;">🔑 指定驗證碼 (Seed)</label>
          <input type="text" id="seedInput" placeholder="若留空將由系統自動產生亂數" style="width: 100%;">
          <p style="font-size: 11px; color: #90a4ae; margin-top: 8px;">※ 相同名單與 Seed 抽籤結果將永久固定，經得起重現稽核。</p>
        </div>
      </div>

      <!-- 面板二：單位名額設定 -->
      <div class="panel">
        <div class="panel-title">2. 單位及測驗狀態名額設定</div>
        
        <div class="list-header">
          <label style="font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px;">
            <input type="checkbox" id="checkAllBtn" checked> 全選
          </label>
          <div style="display: flex; align-items: center; gap: 8px; background: #fff; padding: 6px 10px; border-radius: 8px; border: 1px solid #dee2e6;">
            <span style="font-size: 13px; font-weight: 800;">統一設定：及格</span>
            <input type="number" id="globalPassInput" value="15" min="0" style="width: 60px; padding: 4px; text-align: center;">
            <span style="font-size: 13px; font-weight: 800;">/ 不及格</span>
            <input type="number" id="globalFailInput" value="5" min="0" style="width: 60px; padding: 4px; text-align: center;">
            <button class="btn btn-outline" id="btnApplyGlobal" style="padding: 6px 12px; font-size: 12px;">套用</button>
          </div>
          <div style="margin-left: auto; display: flex; gap: 15px;">
            <label style="color: var(--tfd-red); font-weight: 800; cursor: pointer;">
              <input type="checkbox" id="turboMode"> ⏩ 極速連抽
            </label>
            <label style="font-weight: 800; color: #455a64;">
              🔊 <select id="sfxVolume" style="padding: 2px 6px;"><option value="0.9">小</option><option value="1.2" selected>中</option><option value="1.6">大</option></select>
            </label>
          </div>
        </div>

        <div class="quota-list" id="quotaList">
          <div style="text-align: center; color: #b0bec5; padding: 40px;">請匯入 CSV 清冊或載入測試名單</div>
        </div>

        <button class="btn btn-draw" id="btnStartDraw" disabled>▶ 開始執行抽測抽籤程序</button>
      </div>
    </div>

    <!-- 展示舞台區塊 -->
    <div id="stageArea" style="display: none;">
      <div class="mega-screen" id="stageScreen">
        <div class="mega-progress" id="drawProgress">0 / 0</div>
        <div class="mega-unit" id="dispUnit">---</div>
        <div class="mega-name" id="dispName">READY</div>
        <button class="skip-btn" id="skipBtn">⏭ 跳過大螢幕動畫</button>
      </div>

      <div class="result-header">
        <h2 style="font-weight: 900; letter-spacing: 2px; color: #1a237e;">🏆 本次抽中名冊清單</h2>
        <button class="btn btn-outline" id="btnExportResult" style="font-size: 13px;">💾 下載抽籤稽核報告 (CSV)</button>
      </div>
      
      <div class="winners-grid" id="winnersGrid"></div>
    </div>
  </main>

  <canvas id="confettiCanvas"></canvas>

<script>
  /* =========================================================================
     [系統狀態與資料庫]
  ========================================================================= */
  const ORIG_LAST_NAMES =["陳","林","黃","張","李","王","吳","劉","蔡","楊","許","鄭","謝","郭","洪","曾","廖","賴","徐","周"];
  const ORIG_FIRST_NAMES =["冠廷","承翰","子軒","柏宇","俊傑","家豪","宇辰","廷祐","哲維","昱翔","孟軒","建宏","彥廷","怡君","思妤","雅婷","佳穎","郁庭","語涵","品妍","鈺婷","婉如","子晴","佳蓉"];
  const ORIG_TITLES =["隊員","小隊長","分隊長","隊員","隊員","隊員","教官"];
  const ORIG_UNIT_MAP = {
    '第一大隊':["泉州分隊","建國分隊","城中分隊","雙園分隊","龍山分隊","螢橋分隊","木柵分隊","景美分隊","寶橋分隊","興隆分隊"],
    '第二大隊':["信義分隊","南港分隊","大安分隊","莊敬分隊","安和分隊","復興分隊","舊莊分隊","金華分隊"],
    '第三大隊':["圓山分隊","中山分隊","松江分隊","大直分隊","松山分隊","中崙分隊","八德分隊","民權分隊"],
    '第四大隊':["劍潭分隊","大同分隊","後港分隊","社子分隊","天母分隊","福安分隊","士林分隊","石牌分隊","光明分隊","秀山分隊"]
  };
  const BRIGADE_ORDER = { "第一大隊": 1, "第二大隊": 2, "第三大隊": 3, "第四大隊": 4 };

  const THEME_MAP = {
    "第一大隊": { color: "var(--tfd-red)", bg: "#ffebee" },
    "第二大隊": { color: "var(--tfd-blue)", bg: "#e3f2fd" },
    "第三大隊": { color: "var(--tfd-green)", bg: "#e8f5e9" },
    "第四大隊": { color: "var(--tfd-orange)", bg: "#fff3e0" }
  };

  const state = { 
    fileHash: '', 
    unitsMap: {}, 
    remainingPool: {}, // stores remaining candidates for redraws
    result:[], 
    seed: '', 
    isDrawing: false, 
    skipAnimation: false, 
    hasDrawn: false 
  };

  const el = id => document.getElementById(id);
  const sleep = ms => new Promise(res => setTimeout(res, ms));

  window.addEventListener('beforeunload', (e) => {
    if (state.isDrawing) e.returnValue = '抽籤程序正在進行中，離開將遺失所有資料！';
  });

  window.addEventListener('DOMContentLoaded', () => {
    loadDemoData();
    const sel = document.getElementById('sfxVolume');
    if (sel) { SFX_VOL = parseFloat(sel.value || '1.2'); sel.addEventListener('change', () => { SFX_VOL = parseFloat(sel.value || '1.2'); }); }
  });

  /* =========================================================================[密碼學與 PRNG] 
  ========================================================================= */
  async function sha256(text) {
    try {
      if (!crypto || !crypto.subtle) return "UNSECURE-ENV";
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
    } catch (err) { return "HASH-ERROR"; }
  }

  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = (h << 13) | (h >>> 19); }
    return function() { h = Math.imul(h ^ (h >>> 16), 2246822507); h = Math.imul(h ^ (h >>> 13), 3266489909); return (h ^= (h >>> 16)) >>> 0; };
  }

  function sfc32(a, b, c, d) {
    return function() {
      a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; 
      let t = (a + b) | 0; a = b ^ (b >>> 9); b = (c + (c << 3)) | 0; c = (c << 21) | (c >>> 11); d = (d + 1) | 0; t = (t + d) | 0; c = (c + t) | 0; 
      return (t >>> 0) / 4294967296;
    };
  }

  /* =========================================================================
     [音效與物理禮炮特效]
  ========================================================================= */
  let audioCtx = null;
  let SFX_VOL = 1.2;

  function initAudio() { 
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) { console.warn(e); }
  }

  function playBeep(freq, type, dur, vol = 0.08) {
    vol = vol * SFX_VOL;
    try {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + dur + 0.1);
    } catch(e) {}
  }

  const sndCountdown = () => playBeep(330, 'square', 0.15, 0.05);
  const sndGo = () => { sfxWhoosh(0.07, 0.09); playBeep(880, 'square', 0.18, 0.07); };
  const sndPop = () => playBeep(440, 'triangle', 0.1, 0.06);

  function sfxWhoosh(vol = 0.06, dur = 0.08) {
    try {
      if(!audioCtx) return;
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const src = audioCtx.createBufferSource(); src.buffer = buffer;
      const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 900; filter.Q.value = 0.9;
      const gain = audioCtx.createGain(); const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0.0001, t); gain.gain.exponentialRampToValueAtTime(vol, t + 0.01); gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); src.start();
    } catch(e) {}
  }

  function sfxFlip() {
    playBeep(520, 'triangle', 0.045, 0.05); setTimeout(() => playBeep(260, 'sine', 0.05, 0.05), 35);
  }

  function sfxHit(tier = 'normal') {
    const base = tier === 'jackpot' ? 0.20 : (tier === 'milestone' ? 0.14 : 0.10);
    playBeep(140, 'sine', 0.09, base);
    setTimeout(() => playBeep(920, 'triangle', 0.06, base * 0.7), 40);
    if (tier !== 'normal') setTimeout(() => playBeep(1320, 'triangle', 0.05, base * 0.6), 80);
  }

  function playExaggeratedFanfare() {
    try {
      if (!audioCtx) return; const t0 = audioCtx.currentTime;[523.25, 659.25, 783.99].forEach(f => {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(f, t0);
        gain.gain.setValueAtTime(0.0001, t0); gain.gain.exponentialRampToValueAtTime(0.06, t0 + 0.03); gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.35);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t0); osc.stop(t0 + 0.4);
      });
      const boom = audioCtx.createOscillator(); const boomGain = audioCtx.createGain(); boom.type = 'sine';
      boom.frequency.setValueAtTime(140, t0); boom.frequency.exponentialRampToValueAtTime(40, t0 + 0.25);
      boomGain.gain.setValueAtTime(0.0001, t0); boomGain.gain.exponentialRampToValueAtTime(0.18, t0 + 0.02); boomGain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.35);
      boom.connect(boomGain); boomGain.connect(audioCtx.destination); boom.start(t0); boom.stop(t0 + 0.4);
    } catch (e) {}
  }

  const canvas = el('confettiCanvas'); const ctx = canvas.getContext('2d');
  let particles =[]; let confettiAnimId = null;

  function fireGrandConfetti() {
    if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
    particles = []; const colors =['#D32F2F', '#1976D2', '#FFC107', '#FFFFFF', '#000000'];
    [0.1, 0.5, 0.9].forEach(lx => {
      for(let i = 0; i < 120; i++) {
        particles.push({
          x: canvas.width * lx, y: canvas.height,
          vx: (lx === 0.5 ? (Math.random() - 0.5) * 15 : (lx < 0.5 ? Math.random() * 25 : -Math.random() * 25)),
          vy: -(Math.random() * 30 + 15), size: Math.random() * 12 + 6, color: colors[Math.floor(Math.random() * colors.length)],
          wobbleSpeed: Math.random() * 0.1 + 0.05, tiltAngle: Math.random() * Math.PI, shape: Math.random() > 0.4 ? 'rect' : 'circle'
        });
      }
    });
    renderConfetti();
  }

  function renderConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); let active = false;
    particles.forEach(p => {
      p.tiltAngle += p.wobbleSpeed; p.x += p.vx; p.vy += 0.45; p.y += p.vy; p.vx *= 0.985;
      if (p.y <= canvas.height) active = true;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.tiltAngle); ctx.scale(Math.sin(p.tiltAngle), 1);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 1.3);
      else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    });
    if (active) confettiAnimId = requestAnimationFrame(renderConfetti); else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  /* =========================================================================
     [CSV 解析與狀態轉換]
  ========================================================================= */
  function parseCSVRow(str) {
    const result =[]; let curVal = ''; let inQuotes = false;
    for (let i = 0; i < str.length; i++) {
      if (inQuotes) {
        if (str[i] === '"') { if (i + 1 < str.length && str[i + 1] === '"') { curVal += '"'; i++; } else inQuotes = false; } else curVal += str[i];
      } else {
        if (str[i] === '"') inQuotes = true; else if (str[i] === ',') { result.push(curVal); curVal = ''; } else curVal += str[i];
      }
    }
    result.push(curVal); return result.map(s => s.trim());
  }

  async function processCSV(text, fileName = "名單") {
    try {
      state.fileHash = (await sha256(text)).slice(0, 16);
      el('dashHash').textContent = state.fileHash;
      
      const lines = text.split('\n').filter(l => l.trim().length > 0);
      if (lines.length < 2) throw new Error("檔案沒有資料列。");
      
      state.unitsMap = {};
      let totalValid = 0;
      
      for(let i = 1; i < lines.length; i++) {
        const cols = parseCSVRow(lines[i]);
        if (cols.length >= 4) {
          const row = { unit: cols[0] || '未分類', branch: cols[1] || '', title: cols[2] || '', name: cols[3] || '', status: cols[4] || '及格' };
          row.status = row.status.includes('不及格') ? '不及格' : '及格';
          
          if(!state.unitsMap[row.unit]) {
            state.unitsMap[row.unit] = { '及格': [], '不及格':[] };
          }
          state.unitsMap[row.unit][row.status].push(row);
          totalValid++;
        }
      }
      
      if (totalValid === 0) throw new Error("無法解析出有效的名單資料。");
      
      el('uploadIcon').textContent = '✅';
      el('uploadTitle').textContent = `成功載入：${fileName} (共 ${totalValid} 筆)`;
      el('uploadTitle').style.color = 'var(--tfd-red)';
      
      renderQuotaPanel(); 
      el('btnStartDraw').disabled = false;
    } catch (err) { alert("解析發生錯誤：" + err.message); el('btnStartDraw').disabled = true; }
  }

  function renderQuotaPanel() {
    el('quotaList').innerHTML = '';
    const sortedKeys = Object.keys(state.unitsMap).sort((a, b) => (BRIGADE_ORDER[a] || 99) - (BRIGADE_ORDER[b] || 99));

    sortedKeys.forEach(unit => {
      const passCount = state.unitsMap[unit]['及格'].length;
      const failCount = state.unitsMap[unit]['不及格'].length;
      
      const div = document.createElement('div'); 
      div.className = 'quota-item';
      div.dataset.unit = unit;
      
      div.innerHTML = `
        <div class="q-header-row">
          <label style="cursor:pointer; font-weight:900; color:#1a237e; display:flex; align-items:center; gap:8px; font-size:16px;">
            <input type="checkbox" class="u-cb" checked> ${unit}
          </label>
        </div>
        <div class="q-sub-row">
          <span><span class="badge-status badge-pass">及格</span> 母體: ${passCount}人</span>
          <span style="font-weight:800;">抽取 <input type="number" class="u-num-pass" value="15" min="0" max="${passCount}" oninput="if(this.value>this.max)this.value=this.max;if(this.value<0)this.value=0;" style="width:70px;"> 人</span>
        </div>
        <div class="q-sub-row">
          <span><span class="badge-status badge-fail">不及格</span> 母體: ${failCount}人</span>
          <span style="font-weight:800;">抽取 <input type="number" class="u-num-fail" value="5" min="0" max="${failCount}" oninput="if(this.value>this.max)this.value=this.max;if(this.value<0)this.value=0;" style="width:70px;"> 人</span>
        </div>
      `;
      el('quotaList').appendChild(div);
    });
    applyGlobalQuota();
  }

  function loadDemoData() {
    let csv = "大隊,分隊,職稱,姓名,測驗狀態\n";
    const units =["第一大隊", "第二大隊", "第三大隊", "第四大隊"];
    
    units.forEach(u => {
      const branches = ORIG_UNIT_MAP[u];
      // 每個大隊生成 50人及格，20人不及格
      for(let i = 1; i <= 70; i++) {
        const name = ORIG_LAST_NAMES[Math.floor(Math.random()*ORIG_LAST_NAMES.length)] + ORIG_FIRST_NAMES[Math.floor(Math.random()*ORIG_FIRST_NAMES.length)];
        const branch = branches[Math.floor(Math.random()*branches.length)];
        const title = ORIG_TITLES[Math.floor(Math.random()*ORIG_TITLES.length)];
        const status = i <= 50 ? '及格' : '不及格';
        csv += `${u},${branch},${title},${name},${status}\n`;
      }
    });
    processCSV(csv, "系統內建測試名單.csv");
  }

  /* =========================================================================[UI 事件綁定]
  ========================================================================= */
  el('csvFileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if (!file) return; 
    await processCSV(await file.text(), file.name); e.target.value = ''; 
  });

  el('checkAllBtn').addEventListener('change', (e) => { 
    document.querySelectorAll('.u-cb').forEach(c => c.checked = e.target.checked); 
  });

  el('btnApplyGlobal').addEventListener('click', applyGlobalQuota);
  function applyGlobalQuota() {
    const pNum = parseInt(el('globalPassInput').value, 10) || 0;
    const fNum = parseInt(el('globalFailInput').value, 10) || 0;
    document.querySelectorAll('.quota-item').forEach(item => {
      const pInput = item.querySelector('.u-num-pass');
      const fInput = item.querySelector('.u-num-fail');
      pInput.value = Math.min(pNum, parseInt(pInput.getAttribute('max'), 10));
      fInput.value = Math.min(fNum, parseInt(fInput.getAttribute('max'), 10));
    });
    el('checkAllBtn').checked = true; document.querySelectorAll('.u-cb').forEach(c => c.checked = true);
  }

  el('btnLoadDemo').addEventListener('click', loadDemoData);
  el('btnDownloadSample').addEventListener('click', () => {
    const content = "\uFEFF大隊,分隊,職稱,姓名,測驗狀態\n第一大隊,泉州分隊,隊員,王大明,及格\n第二大隊,信義分隊,小隊長,陳小華,不及格";
    const blob = new Blob([content], {type: 'text/csv;charset=utf-8-sig'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'TFD_名冊公版範例.csv'; a.click();
  });

  /* =========================================================================[核心抽籤引擎]
  ========================================================================= */
  function lockUI(locked) {
    state.isDrawing = locked;
    document.querySelectorAll('input, button').forEach(elem => { if (elem.id !== 'skipBtn') elem.disabled = locked; });
  }

  el('btnStartDraw').addEventListener('click', async () => {
    if (state.isDrawing) return; 
    if (state.hasDrawn && !confirm("重新啟動將會【清空現有名單】。確定要重新抽籤嗎？")) return;
    
    initAudio(); 
    let tasks =[];
    document.querySelectorAll('.quota-item').forEach(item => {
      if (!item.querySelector('.u-cb').checked) return;
      const unit = item.dataset.unit;
      const passCount = parseInt(item.querySelector('.u-num-pass').value, 10) || 0;
      const failCount = parseInt(item.querySelector('.u-num-fail').value, 10) || 0;
      if (passCount > 0) tasks.push({ unit, status: '及格', count: passCount });
      if (failCount > 0) tasks.push({ unit, status: '不及格', count: failCount });
    });
    
    if (tasks.length === 0) return alert("請至少勾選一個單位，並設定抽取人數。");

    tasks.sort((a, b) => (BRIGADE_ORDER[a.unit] || 99) - (BRIGADE_ORDER[b.unit] || 99));

    lockUI(true); el('stageArea').style.display = 'block'; el('winnersGrid').innerHTML = '';
    state.skipAnimation = false; state.result =[]; state.remainingPool = {};

    const customSeed = el('seedInput').value.trim();
    state.seed = customSeed !== "" ? customSeed : ("TFD-" + Math.random().toString(36).substr(2,6).toUpperCase());
    el('dashSeed').textContent = state.seed; el('seedInput').value = state.seed;
    
    const gen = xmur3(state.seed); const rng = sfc32(gen(), gen(), gen(), gen());

    try {
      for (const task of tasks) await runDrawStep(task.unit, task.status, task.count, rng);
      
      el('dispName').textContent = "抽籤圓滿完成"; el('dispName').classList.add('highlight');
      el('drawProgress').textContent = "DONE";
      if (state.skipAnimation && el('winnersGrid').lastElementChild) el('winnersGrid').lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      fireGrandConfetti(); playExaggeratedFanfare(); state.hasDrawn = true;
    } catch (error) { alert("發生非預期錯誤：" + error.message); } finally { lockUI(false); }
  });

  el('skipBtn').addEventListener('click', () => { state.skipAnimation = true; });

  async function runDrawStep(unitName, statusName, count, rng) {
    const candidates =[...state.unitsMap[unitName][statusName]];
    
    for(let i = candidates.length - 1; i > 0; i--) { 
      const j = Math.floor(rng() * (i + 1)); 
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]]; 
    }
    
    const winners = candidates.slice(0, count);
    state.remainingPool[`${unitName}_${statusName}`] = candidates.slice(count);

    const isTurbo = el('turboMode').checked;
    el('dispUnit').textContent = `現在抽取：${unitName} - ${statusName}組`; 
    el('dispName').classList.remove('highlight');
    el('stageScreen').scrollIntoView({ behavior: 'smooth', block: 'center' }); 
    await sleep(250);

    if (!isTurbo && !state.skipAnimation) {
      for(const v of['3', '2', '1']) {
        if (state.skipAnimation) break; el('dispName').textContent = v; sndCountdown(); await sleep(320);
      }
      if (!state.skipAnimation) { el('dispName').textContent = "GO!"; sndGo(); await sleep(220); }
    }

    let prevCard = null;

    for (let i = 0; i < winners.length; i++) {
      const winner = winners[i]; 
      const orderNum = i + 1;
      
      winner.order = orderNum;
      winner.auditNote = ''; 
      state.result.push({ ...winner }); 
      
      el('drawProgress').textContent = `進度: ${orderNum} / ${count}`;
      
      if (state.skipAnimation) { appendWinnerCard(winner, orderNum); continue; }

      if (!isTurbo && i === 0) {
        for(let r = 0; r < 12; r++) { el('dispName').textContent = candidates[Math.floor(Math.random() * candidates.length)].name; await sleep(60); }
        el('dispName').textContent = winner.name; el('dispName').classList.add('highlight'); sndPop();
        
        const card = appendWinnerCard(winner, orderNum);
        if (prevCard) prevCard.classList.remove('is-active','is-milestone','is-jackpot');
        card.classList.add('is-active');
        if (orderNum % 5 === 0) card.classList.add('is-milestone');
        if (orderNum === count) card.classList.add('is-jackpot');
        prevCard = card; sfxFlip(); sfxHit(orderNum===count ? 'jackpot' : (orderNum%5===0 ? 'milestone' : 'normal'));
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });

        await sleep(900); el('dispName').classList.remove('highlight');
      } else {
        el('dispName').textContent = winner.name;
        const card = appendWinnerCard(winner, orderNum);
        if (prevCard) prevCard.classList.remove('is-active','is-milestone','is-jackpot');
        card.classList.add('is-active');
        if (orderNum % 5 === 0) card.classList.add('is-milestone');
        if (orderNum === count) card.classList.add('is-jackpot');
        prevCard = card; sfxFlip(); sfxHit(orderNum===count ? 'jackpot' : (orderNum%5===0 ? 'milestone' : 'normal'));
        
        card.scrollIntoView({ behavior: isTurbo ? 'auto' : 'smooth', block: 'center' }); 
        await sleep(isTurbo ? 60 : 250);
      }
    }
  }

  function appendWinnerCard(w, num) {
    const card = document.createElement('div');
    card.className = 'card';
    
    const theme = THEME_MAP[w.unit] || { color: '#455a64', bg: '#eceff1' };
    card.style.setProperty('--theme-color', theme.color);
    card.style.setProperty('--theme-bg', theme.bg);

    const escapeHTML = str => { const div = document.createElement('div'); div.innerText = str; return div.innerHTML; };
    const statusClass = w.status === '及格' ? 'badge-pass' : 'badge-fail';

    card.innerHTML = `
      <div class="c-status ${statusClass}">${escapeHTML(w.status)}</div>
      <span class="c-tag">抽中序號 #${num}</span>
      <div class="c-name">${escapeHTML(w.name)}</div>
      <div class="c-unit">${escapeHTML(w.branch)} - ${escapeHTML(w.title)}</div>
      <button class="c-redraw-btn" onclick="triggerRedraw('${escapeHTML(w.unit)}', '${escapeHTML(w.status)}', ${num}, this)">🔄 重抽替換此員</button>
    `;
    
    el('winnersGrid').appendChild(card); 
    return card;
  }

  /* =========================================================================
     [單卡重抽替換引擎]
  ========================================================================= */
  window.triggerRedraw = function(unit, status, orderNum, btnElem) {
    const poolKey = `${unit}_${status}`;
    const pool = state.remainingPool[poolKey];
    
    if (!pool || pool.length === 0) {
      return alert(`【${unit} - ${status}組】已無剩餘人員名單可供替換！`);
    }

    const cardElem = btnElem.closest('.card');
    const oldName = cardElem.querySelector('.c-name').innerText;

    if (!confirm(`確定要將 ${oldName} 作廢，並重新抽取一位【${unit} ${status}】人員嗎？\n\n※ 此操作將永久記錄於稽核軌跡中。`)) {
      return;
    }

    // 抽出下一位
    const newWinner = pool.shift(); 
    
    const resultIdx = state.result.findIndex(r => r.unit === unit && r.status === status && r.order === orderNum);
    if (resultIdx !== -1) {
      state.result[resultIdx] = {
        ...newWinner,
        order: orderNum,
        auditNote: `手動排除原中籤者 [${oldName}]，由系統接續抽出遞補`
      };
    }

    cardElem.querySelector('.c-name').innerText = newWinner.name;
    cardElem.querySelector('.c-unit').innerText = `${newWinner.branch} - ${newWinner.title}`;
    
    cardElem.classList.remove('is-active', 'is-milestone', 'is-jackpot');
    void cardElem.offsetWidth; 
    cardElem.classList.add('is-milestone');
    sfxHit('milestone');
    setTimeout(() => cardElem.classList.remove('is-milestone'), 600);
  };

  /* =========================================================================[匯出 CSV 報告]
  ========================================================================= */
  function escapeCSV(val) {
    if (val == null) return '""'; 
    const str = String(val);
    if (str.includes(',') || str.includes('"') || str.includes('\n')) return `"${str.replace(/"/g, '""')}"`;
    return str;
  }

  el('btnExportResult').addEventListener('click', () => {
    if (state.result.length === 0) return alert("目前沒有可匯出的抽籤結果。");
    
    let csv = `\uFEFF--- 臺北市消防局體能抽測抽籤稽核證明 ---\n`;
    csv += `報告產出時間,${new Date().toLocaleString()}\n`;
    csv += `母體清冊 HASH (SHA-256),${state.fileHash}\n`;
    csv += `系統驗證碼 SEED,${state.seed}\n\n`;
    csv += `大隊,測驗狀態,抽中序號,分隊,職稱,姓名,備註(稽核軌跡)\n`;
    
    state.result.forEach(r => { 
      csv += `${escapeCSV(r.unit)},${escapeCSV(r.status)},${r.order},${escapeCSV(r.branch)},${escapeCSV(r.title)},${escapeCSV(r.name)},${escapeCSV(r.auditNote)}\n`; 
    });
    
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8-sig'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
    a.download = `TFD_抽籤結果稽核檔_${state.seed}.csv`; a.click();
  });

  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }); 
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;

</script>
