<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TFD 體能抽測抽籤系統 - 官方儀式版</title>
  <style>
    :root {
      /* 官方質感配色調色盤 */
      --navy-deep: #050a18;
      --navy-light: #16223f;
      --tfd-red: linear-gradient(135deg, #c62828 0%, #8e0000 100%);
      --tfd-gold: linear-gradient(135deg, #d4af37 0%, #f1d37e 50%, #b8860b 100%);
      --gold-solid: #d4af37;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #f0f0f0;
      --text-gold: #e5b13a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--navy-deep);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      /* 背景增加細微的磨砂與標誌浮水印 */
      background-image: 
        radial-gradient(circle at 50% -20%, #1e3a5f 0%, transparent 50%),
        url("https://www.transparenttextures.com/patterns/dark-matter.png");
    }

    /* 頂部質感 Header */
    .ceremony-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(5, 10, 24, 0.85);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: sticky; top: 0; z-index: 100;
    }

    .logo-area { display: flex; align-items: center; gap: 20px; }
    .tfd-logo {
      width: 60px; height: 60px;
      filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
    }

    .header-title h1 { font-size: 24px; letter-spacing: 4px; font-weight: 800; background: var(--tfd-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-title p { font-size: 12px; color: var(--text-gold); letter-spacing: 2px; opacity: 0.8; }

    /* 儀式舞台區 */
    .stage-main { max-width: 1400px; margin: 0 auto; padding: 30px; }

    /* 玻璃質感面板 */
    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    /* 控制面板佈局 */
    .control-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; margin-bottom: 40px; }

    .panel-header {
      font-size: 16px; font-weight: bold; color: var(--text-gold);
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .panel-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--glass-border), transparent); }

    /* 大螢幕螢幕質感 */
    .mega-screen {
      width: 100%; max-width: 900px; margin: 0 auto 50px auto;
      aspect-ratio: 21/9; background: #000;
      border: 2px solid #333; border-radius: 20px;
      position: relative; overflow: hidden;
      box-shadow: 0 0 100px rgba(0,0,0,0.8), inset 0 0 50px rgba(212, 175, 55, 0.05);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    /* 增加掃描線效果，減少 AI 感，增加物理螢幕感 */
    .mega-screen::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 2;
    }

    .unit-display { font-size: 24px; color: var(--text-gold); letter-spacing: 8px; margin-bottom: 15px; font-weight: 300; }
    .name-display { font-size: 100px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 30px rgba(255,255,255,0.2); }

    /* 按鈕質感 */
    .btn {
      padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 14px; letter-spacing: 1px;
    }
    .btn-gold { background: var(--tfd-gold); color: #201a00; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5); }
    .btn-red { background: var(--tfd-red); color: white; width: 100%; font-size: 18px; padding: 18px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .btn-red:hover:not(:disabled) { filter: brightness(1.2); box-shadow: 0 10px 30px rgba(142, 0, 0, 0.5); }
    .btn-red:disabled { background: #444; color: #888; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: var(--text-gold); }

    /* 卡片設計 - 增加反光動態 */
    .card {
      perspective: 1000px; min-height: 160px; position: relative;
    }
    .card-inner {
      position: relative; width: 100%; height: 100%; transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card.face-down .card-inner { transform: rotateY(180deg); }

    .card-front, .card-back {
      position: absolute; inset: 0; backface-visibility: hidden;
      border-radius: 12px; border: 1px solid var(--glass-border); overflow: hidden;
    }
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #16223f 0%, #050a18 100%);
      display: flex; align-items: center; justify-content: center;
    }
    /* 卡片背面的反光掃過動畫 */
    .card-back::after {
      content: ""; position: absolute; inset: -50%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: rotate(45deg); animation: shimmer 4s infinite linear;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

    .card-front {
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      padding: 20px; text-align: center; border-top: 4px solid var(--gold-solid);
    }
    .card-front .c-num { color: var(--text-gold); font-family: "Georgia", serif; font-size: 14px; margin-bottom: 10px; }
    .card-front .c-name { font-size: 26px; font-weight: 900; margin-bottom: 10px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .card-front .c-unit { font-size: 13px; color: var(--text-gold); opacity: 0.9; }
    .card-front .c-id { font-size: 12px; font-family: monospace; color: #888; margin-top: 8px; }

    /* 選中卡片的金屬光澤 */
    .card.is-active .card-front {
      border: 2px solid #f1d37e;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
      transform: scale(1.05); z-index: 10;
    }

    /* 動態列表樣式 */
    .quota-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 10px; }
    .quota-item {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.03); padding: 12px 18px; border-radius: 10px;
      border: 1px solid transparent; transition: 0.3s;
    }
    .quota-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(212, 175, 55, 0.3); }
    
    input[type="number"], input[type="text"] {
      background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
      color: #fff; padding: 8px 12px; border-radius: 6px; outline: none; transition: 0.3s;
    }
    input[type="number"]:focus { border-color: var(--gold-solid); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

    .winners-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
      margin-top: 40px; padding-bottom: 100px;
    }

    /* 隱藏原生檔案輸入 */
    #csvFileInput { display: none; }
    .upload-box {
      border: 2px dashed var(--glass-border); padding: 30px; border-radius: 12px;
      text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 15px;
    }
    .upload-box:hover { border-color: var(--gold-solid); background: rgba(212, 175, 55, 0.05); }

    /* 滾動條美化 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-solid); }

  </style>
</head>
<body>

  <header class="ceremony-header">
    <div class="logo-area">
      <!-- 若無圖檔會顯示預設漸層圓圈 -->
      <img src="./assets/logo.jpg" class="tfd-logo" alt="TFD" onerror="this.src='https://via.placeholder.com/60/d4af37/050a18?text=TFD'">
      <div class="header-title">
        <h1>臺北市政府消防局</h1>
        <p>PHYSICAL FITNESS LOTTERY SYSTEM</p>
      </div>
    </div>
    
    <div id="auditInfo" class="glass-panel" style="padding: 10px 20px; font-size: 11px; font-family: monospace; display: flex; gap: 20px; border-radius: 8px;">
      <div>母體 SHA-256: <span id="hashVal" style="color:var(--text-gold)">尚未載入</span></div>
      <div>隨機 Seed: <span id="seedVal" style="color:var(--text-gold)">---</span></div>
    </div>
  </header>

  <main class="stage-main">
    
    <!-- 設定面板區 -->
    <div class="control-grid">
      
      <!-- 第一步：檔案匯入 -->
      <div class="glass-panel">
        <div class="panel-header">STEP 1. 名冊管理</div>
        <label for="csvFileInput" class="upload-box" id="dropZone">
          <div style="font-size: 30px; margin-bottom: 10px;">📄</div>
          <div style="font-weight: bold; margin-bottom: 5px;">點擊或拖曳上傳清冊</div>
          <div style="font-size: 11px; opacity: 0.6;">CSV 格式：大隊, 分隊, 員編, 姓名, 職稱</div>
          <input type="file" id="csvFileInput" accept=".csv">
        </label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="btn btn-outline" onclick="downloadSample()">下載範例</button>
          <button class="btn btn-gold" onclick="loadDemoData()">載入測試名單</button>
        </div>
      </div>

      <!-- 第二步：規則設定 -->
      <div class="glass-panel">
        <div class="panel-header">STEP 2. 抽籤規則與人數</div>
        
        <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px;">
          <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px;">
            <input type="checkbox" id="checkAll" checked onchange="toggleAll(this.checked)"> 全選單位
          </label>
          <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 13px;">批量人數設定：</span>
            <input type="number" id="globalNum" placeholder="人數" style="width: 80px;">
            <button class="btn btn-gold" style="padding: 6px 12px;" onclick="applyAll()">套用</button>
          </div>
          <label style="font-size: 13px; color: var(--text-gold); cursor: pointer; border-left: 1px solid #444; padding-left: 15px;">
            <input type="checkbox" id="turboMode"> ⏩ 極速模式
          </label>
        </div>

        <div class="quota-list" id="unitList">
          <div style="text-align: center; padding: 40px; color: #555;">等待清冊匯入中...</div>
        </div>

        <button class="btn btn-red" id="startBtn" disabled>開始執行抽測抽籤</button>
      </div>
    </div>

    <!-- 舞台大螢幕 -->
    <div class="mega-screen" id="displayStage" style="display: none;">
      <div class="unit-display" id="dispUnit">---</div>
      <div class="name-display" id="dispName">READY</div>
      <div style="position: absolute; bottom: 20px; left: 20px; font-size: 12px; color: #444; letter-spacing: 2px;">SECURITY ENCRYPTED SESSION</div>
      <button id="skipBtn" style="position: absolute; bottom: 20px; right: 20px; background: none; border: 1px solid #333; color: #333; cursor: pointer; padding: 5px 10px; font-size: 10px; border-radius: 4px; display: none;">SKIP ANIMATION</button>
    </div>

    <!-- 結果牆 -->
    <div id="resultArea" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
        <h2 style="letter-spacing: 4px; border-left: 4px solid var(--gold-solid); padding-left: 15px;">抽中名冊清單</h2>
        <button class="btn btn-outline" onclick="exportCSV()">💾 匯出結果 (帶稽核驗證碼)</button>
      </div>
      <div class="winners-grid" id="winnersGrid"></div>
    </div>

  </main>

  <script>
    // ---------------- 全域狀態 ----------------
    let MASTER_DATA = [];
    let UNIT_MAP = {};
    let RESULT_DATA = [];
    let FILE_HASH = "";
    let IS_DRAWING = false;
    let SKIP_STEP = false;

    const el = id => document.getElementById(id);

    // ---------------- 核心功能：假名冊示範 ----------------
    function loadDemoData() {
      const demoUnits = ["第一大隊", "第二大隊", "第三大隊", "第四大隊"];
      const demoRows = [];
      const firstNames = ["家豪", "冠廷", "承翰", "子軒", "俊傑", "彥廷", "怡君", "雅婷", "欣怡"];
      const lastNames = ["陳", "林", "黃", "張", "李", "王", "吳", "劉", "蔡"];

      demoUnits.forEach(unit => {
        for(let i=1; i<=50; i++) {
          demoRows.push({
            unitGroup: unit,
            branch: unit + " 分隊-" + (Math.floor(Math.random()*5)+1),
            id: "ID-" + Math.floor(Math.random()*10000).toString().padStart(4, '0'),
            name: lastNames[Math.floor(Math.random()*lastNames.length)] + firstNames[Math.floor(Math.random()*firstNames.length)],
            title: "隊員"
          });
        }
      });
      
      const csvContent = "大隊,分隊,員編,姓名,職稱\n" + demoRows.map(r => `${r.unitGroup},${r.branch},${r.id},${r.name},${r.title}`).join("\n");
      processCSV(csvContent);
      alert("已載入測試名冊 (共 200 筆)");
    }

    // ---------------- 檔案與 Hash 處理 ----------------
    el('csvFileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => processCSV(ev.target.result);
      reader.readAsText(file);
    });

    async function processCSV(text) {
      // 計算 Hash
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      FILE_HASH = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase().slice(0, 16);
      el('hashVal').textContent = FILE_HASH;

      // 解析
      const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
      MASTER_DATA = [];
      UNIT_MAP = {};

      lines.slice(1).forEach(line => {
        const cols = line.split(',').map(c => c.trim());
        if(cols.length >= 4) {
          const row = { unitGroup: cols[0], branch: cols[1], id: cols[2], name: cols[3], title: cols[4] || "" };
          MASTER_DATA.push(row);
          if(!UNIT_MAP[row.unitGroup]) UNIT_MAP[row.unitGroup] = [];
          UNIT_MAP[row.unitGroup].push(row);
        }
      });

      renderUnitList();
      el('startBtn').disabled = false;
    }

    function renderUnitList() {
      const listEl = el('unitList');
      listEl.innerHTML = "";
      Object.keys(UNIT_MAP).forEach(unit => {
        const div = document.createElement('div');
        div.className = "quota-item";
        div.innerHTML = `
          <label style="cursor:pointer; display:flex; align-items:center; gap:10px;">
            <input type="checkbox" class="unit-sel" value="${unit}" checked>
            <span>${unit} <small style="opacity:0.5; margin-left:10px;">(母體: ${UNIT_MAP[unit].length})</small></span>
          </label>
          <div>
            抽 <input type="number" class="unit-num" data-unit="${unit}" value="0" style="width:60px;"> 人
          </div>
        `;
        listEl.appendChild(div);
      });
    }

    function toggleAll(chk) { document.querySelectorAll('.unit-sel').forEach(i => i.checked = chk); }
    function applyAll() {
      const val = el('globalNum').value;
      document.querySelectorAll('.unit-num').forEach(i => {
        const max = UNIT_MAP[i.dataset.unit].length;
        i.value = Math.min(val, max);
      });
    }

    // ---------------- 抽籤引擎 ----------------
    // 使用 Seed 確保公平
    function makeRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    const sleep = ms => new Promise(res => setTimeout(res, ms));

    el('startBtn').addEventListener('click', async () => {
      const tasks = [];
      document.querySelectorAll('.quota-item').forEach(item => {
        const sel = item.querySelector('.unit-sel');
        const num = item.querySelector('.unit-num');
        if(sel.checked && parseInt(num.value) > 0) {
          tasks.push({ unit: sel.value, count: parseInt(num.value) });
        }
      });

      if(tasks.length === 0) return alert("請先設定要抽籤的單位與人數");

      // UI 準備
      IS_DRAWING = true;
      SKIP_STEP = false;
      RESULT_DATA = [];
      el('startBtn').disabled = true;
      el('displayStage').style.display = 'flex';
      el('resultArea').style.display = 'block';
      el('skipBtn').style.display = 'block';
      el('winnersGrid').innerHTML = "";

      const seed = Date.now();
      el('seedVal').textContent = seed.toString().slice(-8);
      
      for(const task of tasks) {
        await runUnitDraw(task.unit, task.count, seed);
      }

      el('dispUnit').textContent = "LOTTERY COMPLETE";
      el('dispName').textContent = "抽籤完成";
      el('startBtn').disabled = false;
      el('skipBtn').style.display = 'none';
      IS_DRAWING = false;
    });

    el('skipBtn').onclick = () => { SKIP_STEP = true; };

    async function runUnitDraw(unitName, count, seed) {
      const candidates = [...UNIT_MAP[unitName]];
      const turbo = el('turboMode').checked;

      // 簡單洗牌
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(makeRandom(seed + i) * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }

      const winners = candidates.slice(0, count);
      el('dispUnit').textContent = unitName;
      el('dispName').style.color = "#fff";

      // 建立卡片
      const cards = [];
      winners.forEach((w, idx) => {
        const card = document.createElement('div');
        card.className = "card face-down";
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">
              <div class="c-num">WINNER #${idx+1}</div>
              <div class="c-name">${w.name}</div>
              <div class="c-unit">${w.branch}</div>
              <div class="c-id">${w.id}</div>
            </div>
            <div class="card-back"><div style="color:rgba(255,255,255,0.1); font-weight:900;">TFD</div></div>
          </div>
        `;
        el('winnersGrid').appendChild(card);
        cards.push(card);
        RESULT_DATA.push({ ...w, unit: unitName });
      });

      // 抽籤視覺流程
      for(let i=0; i<winners.length; i++) {
        if(SKIP_STEP) {
          cards[i].classList.remove('face-down');
          continue;
        }

        const w = winners[i];
        const card = cards[i];
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });

        if(!turbo && i < 3) {
          // 前三名：儀式慢抽
          let roll = 0;
          while(roll < 10) {
            el('dispName').textContent = candidates[Math.floor(Math.random()*candidates.length)].name;
            await sleep(60);
            roll++;
          }
          el('dispName').textContent = w.name;
          el('dispName').style.color = "#d4af37";
          card.classList.add('is-active');
          await sleep(300);
          card.classList.remove('face-down');
          await sleep(600);
          card.classList.remove('is-active');
        } else {
          // 後續：快速翻牌
          el('dispName').textContent = w.name;
          card.classList.remove('face-down');
          await sleep(turbo ? 50 : 150);
        }
      }
      await sleep(500);
    }

    // ---------------- 功能按鈕 ----------------
    function downloadSample() {
      const content = "\uFEFF大隊,分隊,員編,姓名,職稱\n第一大隊,城中分隊,A101,王小明,隊員\n第一大隊,城中分隊,A102,陳大華,小隊長";
      const blob = new Blob([content], {type: 'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = "TFD_名冊範例.csv"; a.click();
    }

    function exportCSV() {
      if(RESULT_DATA.length === 0) return;
      let content = "\uFEFF大隊,分隊,員編,姓名,職稱\n";
      RESULT_DATA.forEach(r => {
        content += `${r.unitGroup},${r.branch},${r.id},${r.name},${r.title}\n`;
      });
      content += `\n--- 稽核驗證資訊 ---\n`;
      content += `母體 Hash,${FILE_HASH}\n`;
      content += `亂數 Seed,${el('seedVal').textContent}\n`;
      content += `抽籤時間,${new Date().toLocaleString()}\n`;
      
      const blob = new Blob([content], {type: 'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `抽籤結果_${FILE_HASH.slice(0,6)}.csv`; a.click();
    }
  </script>
</body>
