<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TFD й«”иғҪжҠҪжё¬жҠҪзұӨзі»зөұ - иҲһеҸ°еҠҮе ҙзүҲ</title>
  <style>
    :root {
      --bg-dark: #0a0a15;
      --bg-panel: #1a1a2e;
      --accent-red: #dc2626;
      --accent-blue: #2563eb;
      --accent-gold: #FFB300;
      --text-light: #f8fafc;
      --text-muted: #94a3b8;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a15 100%);
      color: var(--text-light);
      min-height: 100vh;
    }
    
    /* STAGE LAYOUT */
    .stage-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* HEADER */
    .stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 16px;
    }
    .logo-zone { display: flex; align-items: center; gap: 12px; }
    .logo { height: 48px; width: auto; }
    .stage-header h1 { 
      font-size: 18px; 
      font-weight: 700; 
      color: var(--text-light); 
      letter-spacing: 2px; 
    }
    .audit-bar { 
      font-family: var(--font-mono); 
      font-size: 12px; 
      color: var(--text-muted); 
    }
    .audit-bar span { color: var(--accent-red); margin: 0 4px; }
    
    /* MAIN LOTTO SCREEN */
    .lotto-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      min-height: 50vh;
    }
    .brigade-badge {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      padding: 8px 24px;
      border: 1px solid var(--accent-gold);
      border-radius: 20px;
      background: rgba(255,179,0,0.1);
    }
    .big-display {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1e1e3f 0%, #0f0f23 100%);
      border: 2px solid rgba(220,38,38,0.3);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: 0 0 60px rgba(220,38,38,0.2), inset 0 0 60px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .display-label { font-size: 14px; color: var(--text-muted); letter-spacing: 2px; }
    .rolling-name {
      font-size: 72px;
      font-weight: 900;
      color: var(--text-light);
      text-shadow: 0 0 20px rgba(220,38,38,0.5);
      font-family: var(--font-mono);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .display-hint { font-size: 12px; color: var(--text-muted); }
    
    /* CONTROL PANEL */
    .control-panel {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }
    .input-group { display: flex; flex-direction: column; gap: 4px; }
    .input-group label { 
      font-size: 11px; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      letter-spacing: 1px; 
    }
    input[type="text"], input[type="number"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-light);
      padding: 10px 14px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      width: 120px;
      outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent-red);
    }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent-red);
      color: white;
    }
    .btn-primary:hover {
      background: #b91c1c;
      box-shadow: 0 0 20px rgba(220,38,38,0.4);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--text-light);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    
    /* WINNERS WALL */
    .winners-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .section-title {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .winners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .winner-card {
      background: linear-gradient(135deg, rgba(220,38,38,0.1) 0%, rgba(26,26,46,0.8) 100%);
      border: 1px solid rgba(220,38,38,0.3);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .winner-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(220,38,38,0.2);
    }
    .winner-brigade {
      font-size: 11px;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .winner-no {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent-red);
      font-family: var(--font-mono);
    }
    .winner-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-light);
      margin: 8px 0;
    }
    .winner-unit {
      font-size: 12px;
      color: var(--text-muted);
    }
    .winner-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
      margin-top: 4px;
    }
    
    /* CONFETTI */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
    
    /* RESPONSIVE */
    @media (max-width: 768px) {
      .rolling-name { font-size: 48px; }
      .big-display { max-width: 100%; }
      .control-panel { flex-direction: column; align-items: stretch; }
      .winners-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="stage-container">
    <!-- й ӮйғЁпјҡжҘөз°ЎиіҮиЁҠеҚҖ -->
    <header class="stage-header">
      <div class="logo-zone">
        <img src="./assets/logo.jpg" alt="TFD Logo" class="logo" />
        <h1>TFD й«”иғҪжҠҪжё¬жҠҪзұӨзі»зөұ</h1>
      </div>
      <div class="audit-bar">
        Seed: <span id="kvSeed">-</span> | Time: <span id="kvTime">-</span> | SHA: <span id="kvHash">-</span>
      </div>
    </header>

    <!-- дёӯеӨ®пјҡе·ЁеһӢжҠҪзұӨиһўе№• -->
    <main class="lotto-screen">
      <div class="brigade-badge" id="currentBrigade">жә–еӮҷе°ұз·’</div>
      <div class="big-display" id="bigDisplay">
        <div class="display-label" id="displayLabel">еҚіе°ҮжҠҪеҮә...</div>
        <div class="rolling-name" id="rollingName">???</div>
        <div class="display-hint">й»һж“ҠгҖҢй–Ӣе§ӢжҠҪзұӨгҖҚй–Ӣе§Ӣ</div>
      </div>

      <!-- жҺ§еҲ¶еҚҖ -->
      <div class="control-panel">
        <div class="input-group">
          <label>жҜҸйҡҠжҠҪ</label>
          <input type="number" id="pickCount" value="20" min="1" />
        </div>
        <div class="input-group">
          <label>Seed</label>
          <input type="text" id="seed" placeholder="з•ҷз©әиҮӘеӢ•з”ҹжҲҗ" />
        </div>
        <button id="btnGen" class="btn-secondary">ијүе…ҘзҜ„дҫӢ</button>
        <button id="btnDraw" class="btn-primary">й–Ӣе§ӢжҠҪзұӨ</button>
        <button id="btnResult" class="btn-secondary">дёӢијү CSV</button>
      </div>
    </main>

    <!-- еә•йғЁпјҡеҫ—зҚҺиҖ…еұ•зӨәзүҶ -->
    <section class="winners-section">
      <h2 class="section-title">жҠҪдёӯеҗҚе–®</h2>
      <div class="winners-grid" id="winnersGrid"></div>
    </section>
  </div>

  <canvas id="confetti-canvas"></canvas>

<script>
  // ---------- Sound Effects ----------
  let audioCtx = null;
  function initAudio() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, type, duration, vol=0.1) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }
  function playTick() { playTone(1200, 'square', 0.05, 0.02); }
  function playLock() { playTone(800, 'square', 0.1, 0.05); setTimeout(()=>playTone(1200, 'square', 0.15, 0.05), 80); }
  function playSuccess() {
    playTone(523.25, 'triangle', 0.2, 0.1);
    setTimeout(()=>playTone(659.25, 'triangle', 0.2, 0.1), 150);
    setTimeout(()=>playTone(783.99, 'triangle', 0.4, 0.1), 300);
  }

  // ---------- Confetti ----------
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let particles = [];

  function fireConfetti() {
    const colors = ['#dc2626', '#2563eb', '#FFB300', '#10b981', '#ffffff'];
    for(let i=0; i<150; i++) {
      particles.push({
        x: canvas.width / 2, y: canvas.height / 2,
        vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 1) * 25 - 5,
        size: Math.random() * 10 + 5, color: colors[Math.floor(Math.random() * colors.length)],
        tilt: Math.floor(Math.random() * 10) - 10, tiltAngle: 0, tiltAngleInc: (Math.random() * 0.07) + 0.05
      });
    }
    requestAnimationFrame(renderConfetti);
  }

  function renderConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let active = false;
    for(let i=0; i<particles.length; i++) {
      const p = particles[i];
      p.tiltAngle += p.tiltAngleInc;
      p.y += (Math.cos(p.tiltAngle) + 1 + p.size / 2) / 2;
      p.x += Math.sin(p.tiltAngle) * 2 + p.vx;
      p.vy += 0.5;
      p.y += p.vy;

      if(p.y <= canvas.height) active = true;

      ctx.beginPath();
      ctx.lineWidth = p.size;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.size, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.size);
      ctx.stroke();
    }
    if(active) requestAnimationFrame(renderConfetti);
    else particles = [];
  }

  // ---------- RNG ----------
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i=0; i<str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function() {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= (h >>> 16)) >>> 0;
    }
  }
  function sfc32(a, b, c, d) {
    return function() {
      a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
      let t = (a + b) | 0;
      a = b ^ (b >>> 9);
      b = (c + (c << 3)) | 0;
      c = (c << 21) | (c >>> 11);
      d = (d + 1) | 0;
      t = (t + d) | 0;
      c = (c + t) | 0;
      return (t >>> 0) / 4294967296;
    }
  }
  function makeRng(seedText) {
    const seed = seedText && seedText.trim()
      ? seedText.trim()
      : (new Date().toISOString().slice(0,19).replace('T','_') + '_' + Math.random().toString(16).slice(2,6).toUpperCase());
    const gen = xmur3(seed);
    return { seed, rng: sfc32(gen(), gen(), gen(), gen()) };
  }

  // ---------- Data ----------
  const lastNames = ["йҷі","жһ—","й»ғ","ејө","жқҺ","зҺӢ","еҗі","еҠү","и”Ў","жҘҠ","иЁұ","й„ӯ","и¬қ","йғӯ","жҙӘ","жӣҫ","е»–","иіҙ","еҫҗ","е‘Ё"];
  const firstNames = ["еҶ е»·","жүҝзҝ°","еӯҗи»’","жҹҸе®Ү","дҝҠеӮ‘","е®¶иұӘ","е®Үиҫ°","е»·зҘҗ","е“Із¶ӯ","жҳұзҝ”","еӯҹи»’","е»әе®Ҹ","еҪҘе»·",
                     "жҖЎеҗӣ","жҖқеҰӨ","йӣ…е©·","дҪіз©Һ","йғҒеәӯ","иӘһж¶ө","е“ҒеҰҚ","йҲәе©·","е©үеҰӮ","еӯҗжҷҙ","дҪіи“ү"];
  const titles = ["йҡҠе“Ў","е°ҸйҡҠй•·","еҲҶйҡҠй•·","йҡҠе“Ў","йҡҠе“Ў","йҡҠе“Ў","ж•ҷе®ҳ"];
  const unitMap = {
    '1': ["жіүе·һеҲҶйҡҠ","е»әеңӢеҲҶйҡҠ","еҹҺдёӯеҲҶйҡҠ","йӣҷең’еҲҶйҡҠ","йҫҚеұұеҲҶйҡҠ","иһўж©ӢеҲҶйҡҠ","жңЁжҹөеҲҶйҡҠ","жҷҜзҫҺеҲҶйҡҠ","еҜ¶ж©ӢеҲҶйҡҠ","иҲҲйҡҶеҲҶйҡҠ"],
    '2': ["дҝЎзҫ©еҲҶйҡҠ","еҚ—жёҜеҲҶйҡҠ","еӨ§е®үеҲҶйҡҠ","иҺҠж•¬еҲҶйҡҠ","е®үе’ҢеҲҶйҡҠ","еҫ©иҲҲеҲҶйҡҠ","иҲҠиҺҠеҲҶйҡҠ","йҮ‘иҸҜеҲҶйҡҠ"],
    '3': ["ең“еұұеҲҶйҡҠ","дёӯеұұеҲҶйҡҠ","жқҫжұҹеҲҶйҡҠ","еӨ§зӣҙеҲҶйҡҠ","жқҫеұұеҲҶйҡҠ","дёӯеҙҷеҲҶйҡҠ","е…«еҫ·еҲҶйҡҠ","ж°‘ж¬ҠеҲҶйҡҠ"],
    '4': ["еҠҚжҪӯеҲҶйҡҠ","еӨ§еҗҢеҲҶйҡҠ","еҫҢжёҜеҲҶйҡҠ","зӨҫеӯҗеҲҶйҡҠ","еӨ©жҜҚеҲҶйҡҠ","зҰҸе®үеҲҶйҡҠ","еЈ«жһ—еҲҶйҡҠ","зҹізүҢеҲҶйҡҠ","е…үжҳҺеҲҶйҡҠ","з§ҖеұұеҲҶйҡҠ"]
  };
  const brigadeNames = { '1':'з¬¬дёҖеӨ§йҡҠ', '2':'з¬¬дәҢеӨ§йҡҠ', '3':'з¬¬дёүеӨ§йҡҠ', '4':'з¬¬еӣӣеӨ§йҡҠ' };

  function pad(n, w){ return String(n).padStart(w,'0'); }
  function randPick(arr, rng){ return arr[Math.floor(rng()*arr.length)]; }

  function genRoster(perBrigade=50, seedText=''){
    const {seed, rng} = makeRng(seedText || ('GEN_' + Date.now()));
    const rows=[];
    for(let b=1;b<=4;b++){
      const used=new Set();
      const units = unitMap[String(b)];
      for(let i=0;i<perBrigade;i++){
        let empId;
        do{ empId = String(b) + pad(Math.floor(rng()*10000),4); } while(used.has(empId));
        used.add(empId);
        const name = randPick(lastNames,rng) + randPick(firstNames,rng);
        rows.push({ brigade: String(b), unit: randPick(units,rng), empId, name, title: randPick(titles,rng) });
      }
    }
    return { seed, rows };
  }

  function toCSV(rows){
    const header = ['еӨ§йҡҠ','еҲҶйҡҠ','е“Ўз·Ё','е§“еҗҚ','иҒ·зЁұ'];
    const lines=[header.join(',')];
    for(const r of rows){
      lines.push([r.brigade,r.unit,r.empId,r.name,r.title].map(x => '"'+String(x).replaceAll('"','""')+'"').join(','));
    }
    return lines.join('\n');
  }

  async function sha256(text){
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode(text));
    const arr = Array.from(new Uint8Array(buf));
    return arr.map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16).toUpperCase();
  }

  // ---------- State ----------
  const state = { rosterRows: [], rosterCSV: '', resultRows: [], resultCSV: '', drawSeed: '' };
  function el(id){ return document.getElementById(id); }

  function setFairPanel(){
    el('kvTime').textContent = new Date().toLocaleString('zh-TW');
    el('kvSeed').textContent = state.drawSeed || '-';
    el('kvHash').textContent = state.rosterCSV ? (state.rosterHash || '-') : '-';
  }

  // ---------- Draw Logic ----------
  function groupRows(){
    const g={};
    for(let b=1;b<=4;b++) g[String(b)]=[];
    for(const r of state.rosterRows){ if(g[r.brigade]) g[r.brigade].push(r); }
    return g;
  }

  function pickN(rows, n, rng){
    if(n>rows.length) throw new Error(`еҗҚе–®дёҚи¶і`);
    const arr = rows.slice();
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(rng()* (i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr.slice(0,n);
  }

  const sleep = ms => new Promise(res=>setTimeout(res, ms));

  async function runDraw(){
    const n = parseInt(el('pickCount').value,10);
    const { seed, rng } = makeRng(el('seed').value);
    state.drawSeed = seed;

    const groups = groupRows();
    for(let b=1;b<=4;b++){
      if(groups[String(b)].length < n){
        alert(`${brigadeNames[String(b)]} жҜҚй«”дәәж•ё (${groups[String(b)].length}) дёҚи¶і ${n} дәәпјҢз„Ўжі•жҠҪзұӨгҖӮ`);
        return;
      }
    }

    setFairPanel();
    const resultRows=[];
    el('winnersGrid').innerHTML = '';

    for(let b=1;b<=4;b++){
      const key = String(b);
      const list = groups[key];
      const picked = pickN(list, n, rng);
      
      el('currentBrigade').textContent = `зҸҫеңЁжҠҪеҸ–пјҡ${brigadeNames[key]}`;
      el('displayLabel').textContent = "еҚіе°ҮжҠҪеҮә...";
      el('rollingName').style.color = "var(--text-light)";
      el('rollingName').textContent = "READY";
      await sleep(1000);

      for(let i=0; i<picked.length; i++){
        const r = picked[i];
        el('displayLabel').textContent = `з¬¬ ${i+1}/${n} дҪҚ`;
        
        // Rolling animation
        let rollTime = 1000;
        let endTime = Date.now() + rollTime;
        
        return new Promise(resolveOuter => {
          function roll() {
            if(Date.now() < endTime) {
              el('rollingName').textContent = randPick(list, Math.random).name;
              playTick();
              requestAnimationFrame(roll);
            } else {
              // Final picked
              el('rollingName').textContent = r.name;
              el('rollingName').style.color = "var(--accent-red)";
              playLock();
              
              // Add to grid
              const card = document.createElement('div');
              card.className = 'winner-card';
              card.innerHTML = `
                <div class="winner-brigade">${brigadeNames[key]}</div>
                <div class="winner-no">#${String(i+1).padStart(2,'0')}</div>
                <div class="winner-name">${r.name}</div>
                <div class="winner-unit">${r.unit} ${r.title}</div>
                <div class="winner-id">${r.empId}</div>
              `;
              el('winnersGrid').appendChild(card);
              window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
              
              resultRows.push({ brigade:key, no: i+1, unit:r.unit, empId:r.empId, name:r.name, title:r.title });
              
              setTimeout(async () => {
                el('rollingName').style.color = "var(--text-light)";
                if(i < picked.length - 1) {
                  await sleep(500);
                  resolveOuter();
                } else {
                  resolveOuter();
                }
              }, 800);
            }
          }
          roll();
        }).then(() => {
          // This loop continues for each picked person
        });
      }
      await sleep(1500);
    }

    // Done
    el('currentBrigade').textContent = "жҠҪзұӨе®Ңз•ў";
    el('displayLabel').textContent = "MISSION ACCOMPLISHED";
    el('rollingName').textContent = "DONE";
    el('rollingName').style.color = "var(--accent-gold)";
    
    state.resultRows = resultRows;
    state.resultCSV = '\uFEFF' + toResultCSV(resultRows);

    fireConfetti();
    playSuccess();
  }

  function toResultCSV(rows){
    const header=['еӨ§йҡҠ','еәҸиҷҹ','еҲҶйҡҠ','е“Ўз·Ё','е§“еҗҚ','иҒ·зЁұ'];
    const lines=[header.join(',')];
    for(const r of rows){
      const bn = brigadeNames[r.brigade] || r.brigade;
      lines.push([bn, r.no, r.unit, r.empId, r.name, r.title].map(x => '"'+String(x).replaceAll('"','""')+'"').join(','));
    }
    return lines.join('\n');
  }

  // ---------- Events ----------
  el('btnGen').addEventListener('click', async () => {
    const demo = genRoster(100);
    state.rosterRows = demo.rows;
    state.rosterCSV = toCSV(demo.rows);
    state.rosterHash = await sha256(state.rosterCSV);
    state.drawSeed = ''; el('seed').value = '';
    setFairPanel();

    el('btnGen').textContent = "йҮҚж–°з”ҹжҲҗе®Ңз•ў вң“";
    setTimeout(() => el('btnGen').textContent = "ијүе…ҘзҜ„дҫӢ", 1500);
  });

  el('btnDraw').addEventListener('click', async () => {
    initAudio();
    if(!state.rosterRows.length){ alert('жҜҚй«”еҗҚе–®зӮәз©әпјҢи«Ӣе…Ҳијүе…ҘзҜ„дҫӢгҖӮ'); return; }
    el('btnDraw').disabled = true;
    el('btnDraw').textContent = "жҠҪзұӨйҖІиЎҢдёӯ...";
    
    // Fix async loop for runDraw
    const n = parseInt(el('pickCount').value,10);
    const { seed, rng } = makeRng(el('seed').value);
    state.drawSeed = seed;
    const groups = groupRows();
    for(let b=1;b<=4;b++){
      if(groups[String(b)].length < n){
        alert(`${brigadeNames[String(b)]} жҜҚй«”дәәж•ёдёҚи¶і`);
        el('btnDraw').disabled = false;
        el('btnDraw').textContent = "й–Ӣе§ӢжҠҪзұӨ";
        return;
      }
    }
    
    setFairPanel();
    const resultRows=[];
    el('winnersGrid').innerHTML = '';

    for(let b=1;b<=4;b++){
      const key = String(b);
      const list = groups[key];
      const picked = pickN(list, n, rng);
      
      el('currentBrigade').textContent = `зҸҫеңЁжҠҪеҸ–пјҡ${brigadeNames[key]}`;
      el('displayLabel').textContent = "еҚіе°ҮжҠҪеҮә...";
      el('rollingName').style.color = "var(--text-light)";
      el('rollingName').textContent = "READY";
      await sleep(1000);

      for(let i=0; i<picked.length; i++){
        const r = picked[i];
        el('displayLabel').textContent = `з¬¬ ${i+1}/${n} дҪҚ`;
        
        await new Promise(resolve => {
          let rollTime = 1000;
          let endTime = Date.now() + rollTime;
          function roll() {
            if(Date.now() < endTime) {
              el('rollingName').textContent = randPick(list, Math.random).name;
              playTick();
              requestAnimationFrame(roll);
            } else {
              el('rollingName').textContent = r.name;
              el('rollingName').style.color = "var(--accent-red)";
              playLock();
              
              const card = document.createElement('div');
              card.className = 'winner-card';
              card.innerHTML = `
                <div class="winner-brigade">${brigadeNames[key]}</div>
                <div class="winner-no">#${String(i+1).padStart(2,'0')}</div>
                <div class="winner-name">${r.name}</div>
                <div class="winner-unit">${r.unit} ${r.title}</div>
                <div class="winner-id">${r.empId}</div>
              `;
              el('winnersGrid').appendChild(card);
              window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
              
              resultRows.push({ brigade:key, no: i+1, unit:r.unit, empId:r.empId, name:r.name, title:r.title });
              
              setTimeout(() => {
                el('rollingName').style.color = "var(--text-light)";
                resolve();
              }, 800);
            }
          }
          roll();
        });
      }
      await sleep(1500);
    }

    el('currentBrigade').textContent = "жҠҪзұӨе®Ңз•ў";
    el('displayLabel').textContent = "MISSION ACCOMPLISHED";
    el('rollingName').textContent = "DONE";
    el('rollingName').style.color = "var(--accent-gold)";
    
    state.resultRows = resultRows;
    state.resultCSV = '\uFEFF' + toResultCSV(resultRows);

    fireConfetti();
    playSuccess();
    
    el('btnDraw').textContent = "йҮҚж–°жҠҪзұӨ";
    el('btnDraw').disabled = false;
  });

  el('btnResult').addEventListener('click', () => {
    if(!state.resultCSV){ alert('и«Ӣе…Ҳеҹ·иЎҢжҠҪзұӨдҪңжҘӯгҖӮ'); return; }
    const blob = new Blob([state.resultCSV], {type: 'text/csv;charset=utf-8-sig'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `TFD_DrawResult_${state.drawSeed}.csv`; a.click();
    URL.revokeObjectURL(url);
  });
</script>
